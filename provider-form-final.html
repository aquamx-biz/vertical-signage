<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AquaMX · ตั้งร้าน (App Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Mitr:wght@500;600&family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
/* tokens copied verbatim from /offer (same contract as mockup-offer-app) */
:root{
  --navy:#0E3361; --navy-deep:#072147;
  --orange:#C9864C; --orange-strong:#A36738; --orange-soft:#F6E5D0;
  --cream:#F4F6FA; --ink:#0B1B33; --muted:#5C6B82; --white:#fff;
  --line:#E6E9F1; --ink-40:#8B98AE; --green:#2E9E5B;
}
html,body{height:100%;}
body{background:#dfe3ea;color:var(--ink);font-family:'IBM Plex Sans Thai','Nunito',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;}
input,select,textarea{touch-action:manipulation;}
/* ui-ux-pro-max pass: press feedback (150ms, transform-only ไม่ขยับ layout) + focus ring คีย์บอร์ด */
.pt-card,.hub-card,.wchip,.sheet-save,.btn-navy,.btn-line,.ex-add,.img-pick,.login-big,.cta-opt{transition:transform .15s ease,border-color .15s ease,background .15s ease;}
.pt-card:active,.hub-card:active,.wchip:active,.sheet-save:active,.btn-navy:active,.btn-line:active,.ex-add:active,.img-pick:active,.login-big:active{transform:scale(.97);}
button:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* ── app shell · copied from mockup-offer-app ── */
.app{height:100dvh;max-width:480px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px -10px rgba(0,0,0,.2);}
.appbar{flex:0 0 auto;padding:13px 18px 0;background:var(--white);display:flow-root;}
/* แถบ stepper แยกจาก header — มือถือ: ขาวต่อเนื่องกับ header เหมือนเดิม · desktop: ลอยบนพื้นครีมกว้างเท่าคอลัมน์เนื้อหา */
.railbar{flex:0 0 auto;background:var(--white);border-bottom:1px solid var(--line);padding:0 18px 9px;}
.appbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:10px;}
/* ── header ตามเว็บจริง (จำลอง nav-wrap ของ aquamx.biz/provider): โลโก้ภาพ + ลิงก์ + hamburger ── */
.brand-img{height:40px;display:block;}
.site-links{display:none;gap:22px;flex:1;justify-content:center;}
.site-links a{color:var(--ink);font-weight:500;font-size:14.5px;text-decoration:none;}
.nav-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:36px;background:none;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;padding:0;flex:0 0 auto;}
.nav-toggle .bars{position:relative;display:block;width:18px;height:2px;background:var(--navy);border-radius:2px;transition:transform .2s ease,opacity .2s ease;}
.nav-toggle .bars::before,.nav-toggle .bars::after{content:'';position:absolute;left:0;display:block;width:18px;height:2px;background:var(--navy);border-radius:2px;transition:transform .2s ease;}
.nav-toggle .bars::before{top:-6px;} .nav-toggle .bars::after{top:6px;}
.nav-toggle.open .bars{background:transparent;}
.nav-toggle.open .bars::before{transform:translateY(6px) rotate(45deg);}
.nav-toggle.open .bars::after{transform:translateY(-6px) rotate(-45deg);}
.site-menu{display:none;flex-direction:column;border-top:1px solid var(--line);margin:8px -18px 2px;padding:6px 18px 2px;}
.site-menu.open{display:flex;}
.site-menu a{color:var(--ink);font-weight:600;font-size:14.5px;text-decoration:none;padding:11px 2px;}
@media (min-width:768px){.site-links{display:flex;}.nav-toggle{display:none;}}
.brand{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:20px;color:var(--navy);letter-spacing:-.02em;}
.brand .x{color:var(--orange);}
.bar-r{display:flex;align-items:center;gap:10px;}
.lang-btn{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:800;color:var(--navy);}
.exit{font-size:12px;color:var(--muted);background:none;border:none;padding:7px 6px;}
/* stepper วงกลม: ✓ ผ่านแล้ว (บรอนซ์) · เลขวงทึบ = ขั้นปัจจุบัน (เนวี) · วงโปร่ง = ยังไม่ถึง */
.rail{display:flex;align-items:center;gap:6px;}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;flex:0 0 auto;transition:background .2s,color .2s;}
.rdot.done{background:var(--green);color:#fff;}
.rdot.cur{background:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(14,51,97,.12);}
.rdot.todo{background:#fff;border:1.5px solid var(--line);color:var(--ink-40);}
.rl{flex:1;height:3px;border-radius:2px;background:var(--line);transition:background .2s;}
.rl.done{background:var(--green);}
.canvas{flex:1 1 auto;min-height:0;position:relative;display:flex;flex-direction:column;align-items:center;padding:14px 14px 14px;overflow:hidden;}
.canvas-head{flex:0 0 auto;width:100%;text-align:center;margin-bottom:14px;}
.canvas-head h1{font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:800;font-size:19px;color:var(--navy);line-height:1.12;}
.canvas-head p{font-size:13px;color:var(--muted);margin-top:3px;}
.canvas-body{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}
/* แถบปุ่ม ก่อนหน้า/ถัดไป ด้านล่าง (แทนปุ่มลอยกลม) */
/* แถบปุ่มล่างแบบ minimal: ไม่มีกล่อง/เส้นคั่น — สิ่งจำเป็นคือตำแหน่งล่าง+ความสูงกด ≥44px ไม่ใช่แถบขาว */
.actbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px calc(14px + env(safe-area-inset-bottom));}
.btn-prev{flex:0 0 auto;background:none;border:none;color:var(--muted);border-radius:12px;padding:13px 14px;font-weight:800;font-size:14px;}
.btn-next{margin-left:auto;flex:0 0 auto;background:var(--navy);border:none;color:#fff;border-radius:12px;padding:13px 26px;font-weight:800;font-size:14px;box-shadow:0 6px 16px -6px rgba(14,51,97,.45);}
.btn-next:disabled{opacity:.4;box-shadow:none;}
.btn-prev[hidden],.btn-next[hidden]{display:none;} .actbar[hidden]{display:none;}
/* กล่องขาวห่อทั้งชุด (เนื้อหา + หัวข้อด้านล่าง) — เลเยอร์ ขาว→ครีม เหมือน offer app */
.wrap-box{width:100%;align-self:center;background:var(--white);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}
.edit-banner{width:100%;max-width:380px;align-self:center;background:#fff7ec;border:1.5px solid var(--orange);color:var(--orange-strong);border-radius:11px;padding:9px 12px;font-size:12px;font-weight:700;margin-bottom:10px;line-height:1.45;}

/* ── store-type pick ── */
.pt-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
/* การ์ดประเภทร้าน = การ์ดรูปเต็มใบ · ตัวอักษร overlay ล่างบน gradient เข้ม */
.pt-card{position:relative;overflow:hidden;background:var(--cream) center/cover no-repeat;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:left;aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;}
.pt-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,20,40,0) 34%,rgba(7,20,40,.55) 64%,rgba(7,20,40,.9) 100%);pointer-events:none;}
.pt-card>*{position:relative;}
.pt-card.on{border-color:var(--green);transform:scale(1.03);box-shadow:0 10px 26px -10px rgba(14,51,97,.35),inset 0 0 0 2px var(--green);}
.pt-card .pick{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;transition:background .15s,border-color .15s,color .15s;}
.pt-card.on .pick{background:var(--green);border-color:var(--green);color:#fff;}
.pt-card.soon .pick{display:none;}
.pt-card .ic{position:absolute;top:10px;left:10px;font-size:19px;line-height:1;margin:0;background:rgba(255,255,255,.88);border-radius:10px;padding:6px 8px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.pt-card .nm{font-weight:800;font-size:14.5px;color:#fff;line-height:1.25;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.pt-card .ds{font-size:11px;color:rgba(255,255,255,.88);margin-top:3px;line-height:1.4;text-shadow:0 1px 3px rgba(0,0,0,.45);}
.pt-card.soon{opacity:.6;filter:grayscale(.55);cursor:default;}
.pt-card.soon .soon-tag{display:block;font-size:10.5px;font-weight:800;color:#FBD7A8;margin-top:6px;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.pt-note{font-size:12.5px;color:var(--ink-40);line-height:1.55;margin-top:16px;max-width:380px;width:100%;align-self:center;text-align:left;}

/* ── mobile store-page preview (หน้าร้าน /m/p) ── */
.phone-wrap{display:flex;justify-content:center;}
.phone{width:230px;aspect-ratio:9/16;background:#fff;border:3px solid #0c111c;border-radius:16px;overflow:hidden;box-shadow:0 14px 24px -8px rgba(0,0,0,.35);text-align:left;}
.ph-scroll{height:100%;overflow-y:auto;scrollbar-width:none;}
.ph-scroll::-webkit-scrollbar{width:0;}
/* status bar มือถือจริง (เวลา · สัญญาณ · แบต) — ไม่ใช่หัวจอ signage */
.ph-status{display:flex;justify-content:space-between;align-items:center;padding:4px 10px 2px;background:#fff;font-size:7px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.ph-status .r{display:flex;align-items:center;gap:3px;font-size:6.5px;}
.ph-status .op{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;color:var(--navy);letter-spacing:-.01em;}
.ph-status .op b{color:var(--orange);font-weight:800;}
/* app header ตามหน้า handoff จริง (PageShell): ชิพหมวด + ปุ่มภาษา */
.ph-appbar{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 5px;background:#fff;border-bottom:1px solid var(--line);}
.ph-cat{font-size:6.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--orange-strong);background:#fff7ec;border-radius:8px;padding:2px 7px;}
.ph-lang{font-size:7px;font-weight:700;color:#fff;background:var(--navy);border-radius:5px;padding:2px 6px;border:none;cursor:pointer;}
.ph-lang:hover{background:var(--navy-deep);}
.ph-cover{position:relative;aspect-ratio:16/10;background:#11151c center/cover no-repeat;}
.ph-cover.empty::after{content:'แตะใส่รูปปกร้าน';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#8B98AE;font-size:9px;background:#e9edf3;}
body.en .ph-cover.empty::after{content:'Tap to add a cover photo';}
.ph-cover .grad{position:absolute;inset:auto 0 0 0;height:70%;background:linear-gradient(0deg,rgba(7,33,71,.88),transparent);}
.ph-id{position:absolute;left:9px;right:9px;bottom:8px;display:flex;align-items:flex-end;gap:7px;}
.ph-logo{width:30px;height:30px;border-radius:9px;background:#fff center/cover no-repeat;border:1.5px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:15px;color:var(--navy);flex:0 0 auto;}
.ph-nm{font-family:'Mitr',sans-serif;font-weight:600;font-size:12px;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.7);line-height:1.15;}
.ph-pt{font-size:7px;color:rgba(255,255,255,.85);font-weight:600;margin-top:1px;}
.ph-body{padding:9px 10px 12px;}
.ph-h{font-size:7.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--orange-strong);margin:10px 0 4px;}
.ph-h:first-child{margin-top:0;}
.ph-about{font-size:8.5px;line-height:1.5;color:var(--muted);}
.ph-about.empty{color:var(--ink-40);}
.ph-contact{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:5px;}
.ph-cbtn{border:1px solid var(--line);border-radius:7px;padding:5px 2px;text-align:center;font-size:6.5px;font-weight:700;color:var(--navy);background:#fff;}
.ph-cbtn i{display:block;font-style:normal;font-size:9px;margin-bottom:1px;}
.ph-meta{font-size:8px;color:var(--muted);line-height:1.5;}
.ph-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.ph-tag{font-size:6.5px;font-weight:700;color:var(--orange-strong);background:#fff7ec;border:1px solid var(--orange-soft);border-radius:8px;padding:1px 6px;}
.ph-menu-row{display:flex;justify-content:space-between;gap:6px;padding:4px 0;border-bottom:1px dashed var(--line);font-size:8.5px;}
.ph-menu-row .n{color:var(--ink);font-weight:600;} .ph-menu-row .p{font-family:'JetBrains Mono',monospace;color:var(--orange-strong);font-weight:700;white-space:nowrap;}
.ph-note{font-size:7.5px;color:var(--ink-40);margin-top:3px;line-height:1.45;}
.ph-offers{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
.ph-of{border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fff;}
.ph-of .im{height:34px;background:#e9edf3;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--ink-40);}
.ph-of .tx{padding:4px 5px;font-size:7px;font-weight:700;color:var(--muted);}
.tap-hint{flex:0 0 auto;margin-top:8px;font-size:12px;color:var(--orange-strong);font-weight:600;}

/* hotspots — copied from mockup-offer-app */
.hot{cursor:pointer;outline:2px dashed transparent;outline-offset:2px;transition:outline-color .15s,background .15s;border-radius:7px;position:relative;}
.hot:hover,.hot:focus-visible{outline-color:#6DD5E8;background:rgba(109,213,232,.12);}
.hot .chip{position:absolute;top:-9px;right:-6px;background:#6DD5E8;color:#06222b;font-size:8.5px;font-weight:800;border-radius:6px;padding:1px 5px;opacity:0;transition:opacity .15s;z-index:5;}
.hot:hover .chip,.hot:focus-visible .chip{opacity:1;}
/* nudge — กระพริบเรียกสายตาจนกว่าจะแตะครั้งแรก แล้วหยุดเอง */
.hot.nudge{outline-color:#6DD5E8;animation:hotpulse 1.8s ease-in-out infinite;}
.hot.nudge .chip{opacity:1;}
@keyframes hotpulse{0%,100%{box-shadow:0 0 0 0 rgba(109,213,232,0);}50%{box-shadow:0 0 0 6px rgba(109,213,232,.35);}}
.hub-card.nudge{border-color:var(--orange);animation:pkpulse 1.8s ease-in-out infinite;}
/* ติ๊กยอมรับเงื่อนไขก่อนบันทึก — ไม่ติ๊ก = ปุ่มบันทึกกดไม่ได้ */
.agree{display:flex;gap:10px;align-items:flex-start;margin-top:16px;font-size:12.5px;color:var(--muted);line-height:1.55;cursor:pointer;}
.agree input{width:20px;height:20px;margin-top:1px;flex:0 0 auto;accent-color:var(--green);cursor:pointer;}
.agree a{color:var(--orange-strong);font-weight:700;}
@keyframes pkpulse{0%,100%{box-shadow:0 0 0 0 rgba(201,134,76,0);}50%{box-shadow:0 0 0 6px rgba(201,134,76,.22);}}

/* ── store-content hub ── */
.hub{width:100%;max-width:360px;align-self:center;}
.hub-note{background:#eafaf0;border:1.5px solid #bfe6cf;color:#1f7a4d;border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:12px;line-height:1.5;}
/* .hub-card เปล่าๆ = แถวนอนแบบเดิม (sheet เลือกวิธีกรอกเมนูใช้ class นี้ด้วย — ห้ามโดนสไตล์รูป) */
.hub-card{display:flex;align-items:center;gap:12px;background:var(--cream);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:9px;width:100%;text-align:left;}
.hub-card:hover{border-color:var(--orange);}
.hub-card .ic{font-size:22px;flex:0 0 auto;}
.hub-card .tx{flex:1;min-width:0;}
.hub-card .nm{font-weight:800;font-size:14px;color:var(--navy);}
.hub-card .st{font-size:11.5px;color:var(--muted);margin-top:2px;}
.hub-card .st b{color:var(--orange-strong);}
.hub-card .go{color:var(--ink-40);font-size:15px;flex:0 0 auto;}
.hub-card.done .st b{color:var(--green);}
/* เฉพาะในกริด step 3 (.hub-cards) = การ์ดรูปจัตุรัส ตัวอักษรขาว overlay */
.hub-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
.hub-cards .hub-card{position:relative;overflow:hidden;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:8px;background:var(--cream) center/cover no-repeat;border-radius:18px;padding:14px;aspect-ratio:1;margin-bottom:0;}
.hub-cards .hub-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,20,40,.2) 0%,rgba(7,20,40,.08) 28%,rgba(7,20,40,.68) 62%,rgba(7,20,40,.94) 100%);pointer-events:none;}
.hub-cards .hub-card>*{position:relative;}
.hub-cards .hub-card .ic{font-size:30px;background:rgba(255,255,255,.88);border-radius:10px;padding:6px 8px;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hub-cards .hub-card .tx{flex:0 0 auto;width:100%;margin-top:auto;}
.hub-cards .hub-card .nm{color:#fff;font-size:14.5px;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.hub-cards .hub-card .st{color:rgba(255,255,255,.88);text-shadow:0 1px 3px rgba(0,0,0,.45);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hub-cards .hub-card .go{position:absolute;top:10px;right:11px;color:#fff;background:rgba(8,12,22,.45);border-radius:8px;padding:2px 9px;}
.hub-cards .hub-card.done{border-color:var(--green);box-shadow:inset 0 0 0 2px var(--green);}
.hub-cards .hub-card.done .st b{color:#A8E6C2;}
.hub-skip{font-size:12.5px;color:var(--ink-40);line-height:1.55;max-width:360px;text-align:left;}

/* summary + done */
.sum{width:100%;max-width:330px;}
.sum-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.sum-row .k{color:var(--muted);} .sum-row .v{font-weight:700;color:var(--ink);text-align:right;}
.free-pill{margin-top:14px;background:#e9f7ef;color:var(--green);font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px;text-align:center;}
.fin{text-align:center;} .fin .done-check{width:60px;height:60px;border-radius:50%;background:#e9f7ef;color:var(--green);font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.fin-btns{display:flex;flex-direction:column;gap:9px;margin-top:16px;align-items:center;}
.btn-navy{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-weight:800;font-size:14px;min-width:230px;}
.btn-line{background:#fff;color:var(--navy);border:1.5px solid var(--navy);border-radius:12px;padding:11px 22px;font-weight:800;font-size:14px;min-width:230px;}
.btn-ghost{background:none;color:var(--muted);border:none;font-weight:700;font-size:12.5px;padding:6px;}

/* sheet — copied from mockup-offer-app */
.scrim{position:fixed;inset:0;background:rgba(8,12,22,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;}
.scrim.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--white);border-radius:20px 20px 0 0;padding:8px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:41;max-height:82dvh;overflow-y:auto;}
.sheet.open{transform:translateY(0);}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
.sheet h3{font-family:'Mitr','IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:17px;color:var(--navy);margin-bottom:3px;}
.sheet .hint{font-size:12.5px;color:var(--muted);margin-bottom:13px;}
.fld{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;}   /* 16px กัน iOS ซูมเองตอนแตะช่องกรอก */
.fld:focus{outline:none;border-color:var(--orange);}
.fld+.fld{margin-top:10px;}
.fld-lbl{display:block;font-size:12px;font-weight:700;color:var(--ink);margin:14px 0 6px;}
.fld-wrap{position:relative;}
.fld-wrap .fld{padding-right:96px;}
.ai-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#fff7ec;border:1.5px solid var(--orange);color:var(--orange-strong);border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:800;}
.ai-btn.ta{top:12px;transform:none;}
.ai-box{margin-top:10px;background:#fff7ec;border:1.5px solid var(--orange);border-radius:11px;padding:11px 13px;}
.ai-box .ai-h{font-size:11.5px;font-weight:800;color:var(--orange-strong);margin-bottom:6px;}
.ai-box .ai-tx{font-size:13px;color:var(--ink);line-height:1.55;}
.ai-box .ai-act{display:flex;gap:8px;margin-top:9px;}
.ai-box .ai-use{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:800;}
.ai-box .ai-keep{background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;}
.warn{display:block;font-size:12px;color:#b23b2e;font-weight:700;margin-top:6px;}
.sheet-save{width:100%;margin-top:15px;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;}
.word-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.wchip{border:1.5px solid var(--line);background:#fff;border-radius:18px;padding:10px 14px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;}   /* padding เพิ่ม → สูง ~40px+ แตะง่ายขึ้น */
.wchip.on{border-color:var(--green);background:#EFF8F2;color:var(--navy);}
.wchip.add{border-style:dashed;border-color:var(--orange);color:var(--orange-strong);background:#fffdf8;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.ex-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ex-row .fld+.fld,.row2 .fld+.fld{margin-top:0;}   /* กัน .fld+.fld (เว้นบรรทัดแนวตั้ง) มาดันช่องที่อยู่ข้างกันในแถวเดียวกันให้เหลื่อม/สูงไม่เท่ากัน */
.rrm{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:13px;flex:0 0 auto;cursor:pointer;}   /* 44px = touch target ขั้นต่ำ */
.rimg{width:44px;height:44px;border-radius:8px;border:1.5px dashed var(--orange);background:#fffdf8 center/cover no-repeat;color:var(--orange-strong);font-size:13px;flex:0 0 auto;cursor:pointer;}
.rimg.has{border-style:solid;border-color:var(--line);color:transparent;}
.ex-add{border:1.5px dashed var(--orange);background:#fffdf8;color:var(--orange-strong);border-radius:10px;padding:9px 14px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;}
.auto-note{background:#eafaf0;border:1.5px solid #bfe6cf;color:#1f7a4d;border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:10px;line-height:1.5;}
.img-pick{width:100%;border:1.5px dashed var(--orange);border-radius:12px;background:#fffdf8;color:var(--orange-strong);font-weight:800;font-size:14px;padding:16px;cursor:pointer;}
/* แถววันเปิดร้าน — กล่องจัตุรัสเท่ากัน 7 ช่อง (สไตล์ช่อง OTP) · เลือก = เปิด */
.day-row{display:flex;gap:6px;width:100%;margin-top:6px;}
.day-cell{flex:1;min-width:0;aspect-ratio:1;max-height:54px;min-height:44px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-weight:800;font-size:13px;color:var(--ink-40);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:border-color .15s,background .15s,color .15s,transform .15s;}
.day-cell:active{transform:scale(.94);}
.day-cell.on{border-color:var(--green);background:#EFF8F2;color:var(--navy);}
/* ช่องอัพโหลดทรงตามจริง: ปก 16:9 · โลโก้จัตุรัส (แบบช่องสี่เหลี่ยมใน offer app) */
.cov-pick{width:100%;aspect-ratio:16/9;border:1.5px dashed var(--orange);border-radius:14px;background:#fffdf8;color:var(--orange-strong);font-weight:800;font-size:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.logo-pick{width:140px;height:140px;border:1.5px dashed var(--orange);border-radius:16px;background:#fffdf8;color:var(--orange-strong);font-weight:800;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;text-align:center;}
.cov-pick .plus,.logo-pick .plus{font-size:26px;line-height:1;font-weight:600;}
.cov-pick small,.logo-pick small{font-size:11px;font-weight:600;color:var(--ink-40);}
.cov-pick:active,.logo-pick:active{transform:scale(.97);}
.cov-pick,.logo-pick{transition:transform .15s ease;}
.img-have{display:flex;align-items:center;gap:12px;}
.img-have .im{width:74px;height:52px;border-radius:9px;background:#e9edf3 center/cover no-repeat;border:1.5px solid var(--line);flex:0 0 auto;}
.img-have .im.sq{width:52px;}
/* big tap-to-change cover + logo (overlay pattern) */
.cov-box{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);background:#e9edf3 center/cover no-repeat;cursor:pointer;transition:transform .15s ease;}
.logo-box{position:relative;width:104px;height:104px;border-radius:16px;border:1.5px solid var(--line);overflow:hidden;cursor:pointer;transition:transform .15s ease;}
/* checkerboard behind the logo so transparency is visible after bg removal */
.logo-box::before{content:'';position:absolute;inset:0;background:conic-gradient(#eceff4 0 25%,#fff 0 50%,#eceff4 0 75%,#fff 0) 0 0/16px 16px;}
.logo-box .lim{position:absolute;inset:6px;background:center/contain no-repeat;}
.cov-box:active,.logo-box:active{transform:scale(.98);}
.cov-box:focus-visible,.logo-box:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
.scrim-lbl{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:6px;background:rgba(11,27,51,.66);color:#fff;font-weight:800;font-size:13px;padding:9px 16px;border-radius:20px;backdrop-filter:blur(3px);pointer-events:none;white-space:nowrap;}
.logo-box .scrim-lbl{bottom:7px;font-size:10.5px;padding:5px 10px;gap:4px;border-radius:14px;}
.cov-focus{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:5px;}
.cov-focus .cf{width:58px;padding:10px 0;border:none;border-radius:10px;background:rgba(11,27,51,.55);color:#fff;font-family:inherit;font-weight:800;font-size:11.5px;cursor:pointer;backdrop-filter:blur(3px);}
.cov-focus .cf.on{background:var(--green);}
.login-big{display:flex;align-items:center;gap:12px;width:100%;border-radius:12px;padding:14px;font-weight:800;font-size:14.5px;border:none;margin-top:10px;}
.login-line{background:#06C755;color:#fff;}
.login-mail{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
.login-big .lic{font-size:19px;}
.proto-tag{position:fixed;top:6px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;padding:3px 10px;border-radius:8px;z-index:50;opacity:.8;}

/* ═══ RESPONSIVE LAYER (ไฟล์ทดลอง) — ฐานมือถือคงเดิม 100% · จอกว้างได้ของเพิ่มอย่างเดียว ═══ */
/* ── แท็บเล็ต ≥768px ── */
@media (min-width:768px){
  body{background:linear-gradient(160deg,#E9EDF5,#D9E0EB);}
  .app{max-width:640px;box-shadow:0 24px 70px -28px rgba(14,51,97,.35);}
  .wrap-box{max-width:560px;}
  .sum{max-width:440px;}
}
/* ── Desktop ≥1024px: หน้าเว็บเต็มจอแบบ landing page (ไม่ใช่หน้าต่างแอปลอย) + sheet เป็น dialog ── */
@media (min-width:1024px){
  html,body{height:auto;overflow:auto;}
  body{background:var(--cream);}
  .app{max-width:none;height:auto;min-height:100dvh;margin:0;border-radius:0;box-shadow:none;}
  /* แถบขาวบน-ล่างกว้างเต็มจอ แต่ของข้างในคุมเป็นคอลัมน์ 1200 เหมือน nav-wrap เว็บจริง */
  .appbar{padding:13px max(24px,calc((100% - 1200px)/2));border-bottom:1px solid var(--line);}
  .appbar-top{margin-bottom:0;}
  /* stepper ลงมาจาก header: ลอยบนพื้นครีม กว้างเท่าคอลัมน์เนื้อหา 880 */
  .railbar{background:transparent;border-bottom:none;max-width:880px;margin:26px auto 0;padding:0 24px;width:100%;}
  .actbar{padding-inline:max(24px,calc((100% - 880px)/2));}   /* ปุ่มเกาะขอบคอลัมน์เนื้อหา ไม่ลอยไปสุดจอ */
  .canvas{overflow:visible;padding:22px 24px;}
  .canvas-body{overflow:visible !important;}
  /* เนื้อหาเป็นคอลัมน์กลางบนพื้นครีมโดยตรง — ไม่มีกล่อง wrapper */
  .wrap-box{max-width:880px;padding:0;background:transparent;border:none;box-shadow:none;border-radius:0;}
  .pt-pick{grid-template-columns:repeat(4,1fr);gap:14px;}   /* การ์ดประเภทร้าน 4 ใบแถวเดียวเต็มกว้าง */
  /* การ์ด hub บนจอกว้าง: จัตุรัสจัดกลาง ขนาดอิงความสูงจอ (หัก header+หัวข้อ+note+ปุ่มล่าง ~430px) → หน้า step 3 จบในจอเดียว ไม่ต้อง scroll */
  .hub-cards{grid-template-columns:repeat(auto-fit,minmax(0,clamp(170px,calc(100dvh - 430px),300px)));justify-content:center;gap:16px;}
  .hub-cards .hub-card{aspect-ratio:1;}
  .sheet{left:50%;right:auto;bottom:auto;top:50%;width:540px;max-width:92vw;max-height:84vh;border-radius:20px;
    transform:translate(-50%,-50%) scale(.96);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;
    padding:8px 22px 22px;}
  .sheet.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
  .sheet .grab{display:none;}
}

        <div class="sum-row"><span class="k">${L('บัญชี','Account')}</span><span class="v">${S.auth?(S.auth.kind==='line'?'💬 LINE':'✉️ '+(S.auth.email||'Email')):L('ยังไม่ล็อกอิน — ล็อกอินตอนบันทึก','not signed in — sign in on save')}</span></div>
        <label class="agree"><input type="checkbox" ${S.agree?'checked':''} onchange="S.agree=this.checked;renderStep()"><span>${L('ฉันยอมรับ','I agree to the')} <a href="#" onclick="event.preventDefault();alert('(prototype) ${L('หน้าเงื่อนไขการใช้บริการ','Terms of service page')}')">${L('เงื่อนไขการใช้บริการ','terms of service')}</a> ${L('และ','and the')} <a href="#" onclick="event.preventDefault();alert('(prototype) ${L('หน้านโยบายความเป็นส่วนตัว','Privacy policy page')}')">${L('นโยบายความเป็นส่วนตัว','privacy policy')}</a>${L(' และยืนยันว่าข้อมูลร้านเป็นความจริง',', and confirm my store information is accurate')}</span></label>
      </div></div>`;

}

function bindHot(){document.querySelectorAll('.hot[data-edit]').forEach(h=>{const o=()=>{if(!S.sawPhone){S.sawPhone=true;document.querySelectorAll('.hot.nudge').forEach(x=>x.classList.remove('nudge'));}openSheet(h.dataset.edit);};h.onclick=o;h.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();o();}};});}

function onPic(inp,k){const f=inp.files[0];if(f)S[k]=URL.createObjectURL(f);inp.value='';openSheet('cover');renderStep();}
function onLogo(inp){const f=inp.files[0];if(f){S.logo=URL.createObjectURL(f);S.logoPrev='';S.logoWarn=false;checkLogoBg();}inp.value='';openSheet('cover');renderStep();}
/* วาดโลโก้ลง canvas (ย่อไม่เกิน 1024px) แล้วคืน {canvas,ctx,imageData} */
function logoCanvas(cb){const im=new Image();im.onload=()=>{
  const k=Math.min(1,1024/Math.max(im.width,im.height));
  const c=document.createElement('canvas');c.width=Math.round(im.width*k);c.height=Math.round(im.height*k);
  const x=c.getContext('2d');x.drawImage(im,0,0,c.width,c.height);
  cb(c,x,x.getImageData(0,0,c.width,c.height));
};im.src=S.logo;}
/* ตรวจจาก pixel จริง: มุมทั้ง 4 ทึบและสีเดียวกัน = พื้นหลังไม่โปร่งใส (แม่นกว่าดูนามสกุลไฟล์) */
function checkLogoBg(){logoCanvas((c,x,img)=>{
  const d=img.data,W=c.width,H=c.height;
  const px=(i,j)=>{const o=(j*W+i)*4;return[d[o],d[o+1],d[o+2],d[o+3]];};
  const cs=[px(0,0),px(W-1,0),px(0,H-1),px(W-1,H-1)];
  const near=(a,b)=>Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1])+Math.abs(a[2]-b[2])<60;
  S.logoWarn=cs.every(p=>p[3]>250)&&near(cs[0],cs[1])&&near(cs[0],cs[2])&&near(cs[0],cs[3]);
  openSheet('cover');renderStep();
});}
/* ลบพื้นหลังจริงด้วย flood-fill จากขอบรูป: ลบเฉพาะสีใกล้สีพื้น (กันโดนสีเดียวกันกลางโลโก้) + ขอบจางนุ่ม */
function removeLogoBg(){logoCanvas((c,x,img)=>{
  const d=img.data,W=c.width,H=c.height,TOL=48;
  const o0=0,bg=[d[o0],d[o0+1],d[o0+2]];
  const dist=o=>{const r=d[o]-bg[0],g=d[o+1]-bg[1],b=d[o+2]-bg[2];return Math.sqrt(r*r+g*g+b*b);};
  const seen=new Uint8Array(W*H),st=[];
  for(let i=0;i<W;i++)st.push([i,0],[i,H-1]);
  for(let j=0;j<H;j++)st.push([0,j],[W-1,j]);
  while(st.length){const [i,j]=st.pop();if(i<0||j<0||i>=W||j>=H)continue;const idx=j*W+i;if(seen[idx])continue;seen[idx]=1;
    const o=idx*4;if(dist(o)>=TOL)continue;d[o+3]=0;st.push([i+1,j],[i-1,j],[i,j+1],[i,j-1]);}
  for(let j=0;j<H;j++)for(let i=0;i<W;i++){const o=(j*W+i)*4;if(!d[o+3])continue;
    const edge=[[1,0],[-1,0],[0,1],[0,-1]].some(([a,b])=>{const ii=i+a,jj=j+b;return ii>=0&&jj>=0&&ii<W&&jj<H&&!d[(jj*W+ii)*4+3];});
    if(edge){const t=dist(o);if(t<TOL*2)d[o+3]=Math.min(d[o+3],Math.round(255*t/(TOL*2)));}}
  x.putImageData(img,0,0);
  S.logoPrev=S.logo;S.logo=c.toDataURL('image/png');S.logoWarn=false;
  openSheet('cover');renderStep();
});}
function undoLogoBg(){if(!S.logoPrev)return;S.logo=S.logoPrev;S.logoPrev='';checkLogoBg();}
function setFocus(f){S.coverFocus=f;openSheet('cover');renderStep();}
/* about + tags (+ custom + ✨AI) */
function syncAbout(){if(el('fName'))S.name=el('fName').value;if(el('fAbout'))S.about=el('fAbout').value;}
function addCustomTags(){const v=(el('fTagCustom')&&el('fTagCustom').value||'').split(',').map(s=>s.trim()).filter(Boolean);v.forEach(x=>{if(!S.tags.includes(x))S.tags.push(x);});}
function tglTag(tg){syncAbout();addCustomTags();const i=S.tags.indexOf(tg);if(i>=0)S.tags.splice(i,1);else S.tags.push(tg);openSheet('about');}
function saveAbout(){syncAbout();addCustomTags();closeSheet();renderStep();}
function aiAbout(){syncAbout();
  const tags=S.tags.slice(0,3).map(tagL).join(' · ');
  const dsL=S.lang==='en'?(ptype().dsEn||'great services near you'):(ptype().ds||'บริการดีๆ ใกล้คุณ');
  const base=S.about||`${S.name||L('ร้านของเรา','Our store')} — ${dsL}`;
  const sug=S.about
    ?`${S.about.replace(/\s+$/,'')} ${tags?L('จุดเด่น: ','Highlights: ')+tags+'.':''} ${L('ยินดีต้อนรับทุกท่านค่ะ/ครับ','We look forward to seeing you!')}`
    :`${base}. ${tags?L('จุดเด่น: ','Highlights: ')+tags+'.':''} ${L('เปิดบริการ','Open')} ${hoursText()} ${L('ที่','at')} ${S.loc||'de Residenz'} — ${L('แวะมาหากันได้เลย!','drop by any time!')}`;
  el('aiAboutBox').innerHTML=`<div class="ai-box"><div class="ai-h">✨ ${S.about?L('AI เกลาให้ — เทียบก่อนได้','AI polish — compare first'):L('AI ร่างให้ — เทียบก่อนได้','AI draft — compare first')}</div><div class="ai-tx" id="aiAboutTx">${esc(sug)}</div>
    <div class="ai-act"><button class="ai-use" onclick="useAiAbout()">${L('ใช้ข้อความนี้','Use this')}</button><button class="ai-keep" onclick="el('aiAboutBox').innerHTML=''">${L('เก็บของเดิม','Keep mine')}</button></div></div>`;
}
function useAiAbout(){S.about=el('aiAboutTx').textContent;openSheet('about');renderStep();}
function aiTags(){syncAbout();addCustomTags();
  const sug=(AI_TAGS[S.ptype]||AI_TAGS.shop).filter(x=>!S.tags.includes(x));
  el('aiTagBox').innerHTML=sug.length?`<div class="ai-box"><div class="ai-h">✨ ${L('AI แนะนำจุดเด่น — แตะเพื่อเพิ่ม','AI suggestions — tap to add')}</div>
    <div class="word-chips" style="margin-top:2px;">${sug.map(x=>`<button class="wchip add" onclick="addAiTag('${esc(x)}')">＋ ${esc(tagL(x))}</button>`).join('')}</div></div>`
    :`<div class="ai-box"><div class="ai-h">✨ ${L('เพิ่มครบแล้ว','All added')}</div></div>`;
}
function addAiTag(x){if(!S.tags.includes(x))S.tags.push(x);openSheet('about');renderStep();aiTags();}
/* contact */
function syncContact(){[['fPhone','phone'],['fLine','line'],['fWeb','web'],['fMap','map'],['fLoc','loc'],['fStOpen','open'],['fStClose','close']].forEach(([id,k])=>{if(el(id))S[k]=el(id).value;});}
function saveContact(){syncContact();closeSheet();renderStep();}
/* store-content rows — [ชื่อ, ราคา, รูป] · รูปต่อรายการเหมือนฟอร์ม /offer (mn-thumb) */
function rowsHtml(rows){const r=rows.length?rows:[['','','']];return r.map((x,i)=>`<div class="ex-row"><button class="rimg ${x[2]?'has':''}" ${x[2]?`style="background-image:url('${x[2]}')"`:''} onclick="pickRowImg(${i})" aria-label="${L('ใส่รูปรายการ','Add item photo')}" title="${L('รูปรายการ','Item photo')}">${x[2]?'':'📷'}</button><input class="fld rN" value="${esc(x[0])}" aria-label="${L('ชื่อรายการ','Item name')}" placeholder="${L('ชื่อรายการ','Item name')}"><input class="fld rP" value="${esc(x[1])}" aria-label="${L('ราคา','Price')}" placeholder="${L('ราคา','Price')}" style="max-width:86px"><button class="rrm" onclick="rmRow(${i})" aria-label="${L('ลบรายการนี้','Remove this item')}">✕</button></div>`).join('');}
function syncRows(){const ns=[...document.querySelectorAll('#rowsBox .rN')].map(x=>x.value),ps=[...document.querySelectorAll('#rowsBox .rP')].map(x=>x.value);const old=S[rowKind];S[rowKind]=ns.map((n,i)=>[n,ps[i]||'',(old[i]&&old[i][2])||'']);}
function syncLinks(){if(el('fMenuLink'))S.menuLink=el('fMenuLink').value;if(el('fOrderLink'))S.orderLink=el('fOrderLink').value;if(el('fDeliv'))S.deliv=el('fDeliv').value;if(el('fMin'))S.min=el('fMin').value;}
let rowImgIdx=0;
function pickRowImg(i){syncRows();syncLinks();rowImgIdx=i;if(!S[rowKind][i])S[rowKind][i]=['','',''];el('rowImgFile').click();}
function onRowImg(inp){const f=inp.files[0];if(f&&S[rowKind][rowImgIdx])S[rowKind][rowImgIdx][2]=URL.createObjectURL(f);inp.value='';openSheet(rowKind);}
/* เลือกวิธีใส่เมนู: null=หน้าเลือก · type=กรอกเอง · photo=AI อ่านรูป · link=AI อ่านลิงก์ */
function setMenuMode(m){if(el('rowsBox')){syncRows();syncLinks();}S.menuMode=m;openSheet('menu');}
/* 🤖 อ่านเมนูจากรูปด้วย AI — mock (ของจริง: ส่งรูปเข้า Netlify fn → Claude vision อ่าน
   → คืน [{ชื่อ,ราคา}] → เติมให้ตรวจก่อนบันทึก · pattern เดียวกับ extract-payment ที่อ่านสลิปอยู่แล้ว) */
function onMenuPhoto(inp){
  const f=inp.files[0];inp.value='';if(!f)return;
  if(el('rowsBox')){syncRows();syncLinks();}
  el('aiMenuBox').innerHTML=`<div class="ai-box"><div class="ai-h">🤖 ${L('AI กำลังอ่านเมนูจากรูป…','AI is reading your menu…')}</div></div>`;
  setTimeout(()=>{
    const mock=[[L('ข้าวซอยไก่','Khao Soi (chicken)'),'89',''],[L('ผัดไทยกุ้งสด','Pad Thai (prawn)'),'95',''],[L('ชาเย็น','Thai iced tea'),'45','']];
    const names=new Set(S.menu.map(r=>r[0]));
    mock.forEach(r=>{if(!names.has(r[0]))S.menu.push(r);});
    S.menuMode='type';   // อ่านเสร็จ → กลับหน้าตัวแก้ไขให้ตรวจ
    openSheet('menu');
    el('aiMenuBox').innerHTML=`<div class="ai-box"><div class="ai-h">✨ ${L(`AI อ่านได้ ${mock.length} รายการ (mock) — ตรวจชื่อ/ราคาแล้วแก้ได้ก่อนบันทึก`,`AI read ${mock.length} items (mock) — review names/prices before saving`)}</div></div>`;
  },900);
}
/* 🤖 อ่านเมนูจากลิงก์ — mock (ของจริง: function fetch หน้าเว็บ/รูป/PDF → Claude สกัดรายการ
   · FB/IG ติด login wall อ่านไม่ได้ → แนะนำแคปจอแล้วใช้ปุ่มอัปรูปแทน) */
function aiMenuFromLink(){
  if(el('rowsBox')){syncRows();}syncLinks();
  if(!S.menuLink.trim()){el('aiMenuBox').innerHTML=`<div class="ai-box"><div class="ai-h">⚠️ ${L('ใส่ลิงก์ในช่องก่อน แล้วกดอ่านอีกครั้ง','Paste a link first, then tap read again')}</div></div>`;return;}
  el('aiMenuBox').innerHTML=`<div class="ai-box"><div class="ai-h">🤖 ${L('AI กำลังเปิดลิงก์และอ่านเมนู…','AI is opening the link and reading…')}</div></div>`;
  setTimeout(()=>{
    const mock=[[L('กะเพราหมูกรอบ','Crispy pork basil'),'75',''],[L('ต้มยำกุ้ง','Tom Yum Goong'),'120',''],[L('ข้าวผัดปู','Crab fried rice'),'110',''],[L('น้ำมะพร้าว','Coconut water'),'40','']];
    const names=new Set(S.menu.map(r=>r[0]));
    mock.forEach(r=>{if(!names.has(r[0]))S.menu.push(r);});
    S.menuMode='type';   // อ่านเสร็จ → กลับหน้าตัวแก้ไขให้ตรวจ
    openSheet('menu');
    el('aiMenuBox').innerHTML=`<div class="ai-box"><div class="ai-h">✨ ${L(`AI อ่านจากลิงก์ได้ ${mock.length} รายการ (mock) — ตรวจชื่อ/ราคาก่อนบันทึก`,`AI read ${mock.length} items from the link (mock) — review before saving`)}</div></div>`;
  },1100);
}
function addRow(k){rowKind=k;syncRows();syncLinks();S[k].push(['','','']);openSheet(k);}
function rmRow(i){syncRows();syncLinks();S[rowKind].splice(i,1);openSheet(rowKind);}
function tglFul(f){syncLinks();const a=S.ful,i=a.indexOf(f);if(i>=0)a.splice(i,1);else a.push(f);openSheet('order');}
function saveRows(k){rowKind=k;syncRows();syncLinks();S[k]=S[k].filter(r=>r[0]);closeSheet();renderStep();}
function saveOrderCfg(){syncLinks();closeSheet();renderStep();}
function syncBook(){if(!el('fBkOn'))return;S.book.on=el('fBkOn').checked;S.book.slot=el('fBkSlot').value;S.book.ahead=el('fBkAhead').value;S.book.breakS=el('fBkBreakS').value;S.book.breakE=el('fBkBreakE').value;S.book.cap=el('fBkCap').value;}
/* วันเปิดเป็นของร้าน (ที่เดียว) — แตะชิปวันใน sheet ติดต่อ & เวลาเปิด */
function tglDay(i){syncContact();const a=S.days,x=a.indexOf(i);if(x>=0)a.splice(x,1);else{a.push(i);a.sort();}openSheet('contact');}
function saveBook(){syncBook();closeSheet();renderStep();}
/* login-first (mock ของ LINE Login + Email OTP ในฟอร์มจริง) */
function authLine(){S.auth={kind:'line'};closeSheet();finish();}
function authEmailStart(){el('otpBox').innerHTML=`<label class="fld-lbl">${L('อีเมล','Email')}</label><input class="fld" id="fEmail" type="email" placeholder="you@email.com">
  <button class="sheet-save" onclick="authEmailOtp()">${L('ส่งรหัส OTP','Send OTP')}</button>`;}
function authEmailOtp(){const em=el('fEmail').value||'you@email.com';el('otpBox').innerHTML=`<div class="auto-note">📨 ${L('(mock) ส่งรหัสไปที่','(mock) code sent to')} ${esc(em)}</div>
  <input class="fld" id="fOtp" inputmode="numeric" maxlength="6" placeholder="${L('รหัส 6 หลัก','6-digit code')}">
  <button class="sheet-save" onclick="S.auth={kind:'email',email:'${esc(em)}'};closeSheet();finish();">${L('ยืนยัน','Verify')}</button>`;}
/* finish → 2 ปลายทาง (dashboard / ลงโฆษณาต่อ) + โหมดแก้ไขร้าน */
function finish(){
  el('canvas').innerHTML=`<div class="canvas-body"><div class="fin"><div class="done-check">✓</div>
    <div style="font-family:'Mitr';font-weight:600;font-size:20px;color:var(--navy)">${S.editMode?L('ส่งการแก้ไขแล้ว!','Changes submitted!'):L('บันทึกร้านแล้ว!','Store saved!')}</div>
    <p style="font-size:13px;color:var(--muted);margin-top:8px;max-width:260px">(prototype) ${S.editMode?L('ร้านที่เผยแพร่แล้ว — การแก้ไขถูกส่งให้แอดมินตรวจ · ตัวที่ขึ้นจอยังเป็นเวอร์ชันเดิมจนกว่าจะอนุมัติ','This store is live — changes go to admin review; the on-screen version stays until approved'):L('โปรไฟล์ + เมนู/การขายถูกเก็บไว้ที่ร้าน — ลงโฆษณากี่ตัวก็ไม่ต้องกรอกซ้ำ','Profile + menu/selling are saved on the store — run any number of ads without re-typing')}</p>
    <div class="fin-btns">
      <button class="btn-navy" onclick="location.href='mockup-offer-app.html'">${L('＋ ลงโฆษณาต่อเลย →','＋ Run your first ad →')}</button>
      <button class="btn-line" onclick="alert('${L('(prototype) ไปหน้า Dashboard ร้านของฉัน','(prototype) Goes to My Store dashboard')}')">${L('🏠 ไปหน้าร้านของฉัน (Dashboard)','🏠 My Store (Dashboard)')}</button>
      <button class="btn-ghost" onclick="S.editMode=true;S.step=2;el('actbar').hidden=false;renderStep();">${L('✏️ แก้ไขร้าน (โหมดแก้ไข)','✏️ Edit store (edit mode)')}</button>
    </div></div></div>`;
  el('rail').innerHTML='';el('actbar').hidden=true;
}

el('nextBtn').onclick=()=>{
  if(el('nextBtn').disabled)return;
  if(S.step<S.total){S.step++;renderStep();}
  else{if(!S.auth)openSheet('login');else finish();}
};
el('backBtn').onclick=()=>{if(S.step>1){S.step--;renderStep();}};
el('scrim').onclick=closeSheet;
renderStep();
</script>
