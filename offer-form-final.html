<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AquaMX · ลงโฆษณา (App Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Mitr:wght@500;600&family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
/* tokens copied verbatim from /offer */
:root{
  --navy:#0E3361; --navy-deep:#072147;
  --orange:#C9864C; --orange-strong:#A36738; --orange-soft:#F6E5D0;
  --cream:#F4F6FA; --ink:#0B1B33; --muted:#5C6B82; --white:#fff;
  --line:#E6E9F1; --ink-40:#8B98AE; --green:#2E9E5B;
}
html,body{height:100%;}
body{background:#dfe3ea;color:var(--ink);font-family:'IBM Plex Sans Thai','Nunito',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;}
button:active{transform:scale(.97);}
button:focus-visible,.fld:focus-visible,select:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.app{height:100dvh;max-width:480px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px -10px rgba(0,0,0,.2);}
.appbar{flex:0 0 auto;padding:13px 18px 0;background:var(--white);display:flow-root;}
/* แถบ stepper แยกจาก header — มือถือ: ขาวต่อเนื่องกับ header เหมือนเดิม · desktop: ลอยบนพื้นครีมกว้างเท่าคอลัมน์เนื้อหา */
.railbar{flex:0 0 auto;background:var(--white);border-bottom:1px solid var(--line);padding:0 18px 9px;}
.appbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:10px;}
/* ── header ตามเว็บจริง (จำลอง nav-wrap ของ aquamx.biz/offer): โลโก้ภาพ + ลิงก์ + hamburger ── */
.brand-img{height:40px;display:block;}
.site-links{display:none;gap:22px;flex:1;justify-content:center;}
.site-links a{color:var(--ink);font-weight:500;font-size:14.5px;text-decoration:none;}
.nav-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:36px;background:none;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;padding:0;flex:0 0 auto;}
.nav-toggle .bars{position:relative;display:block;width:18px;height:2px;background:var(--navy);border-radius:2px;transition:transform .2s ease,opacity .2s ease;}
.nav-toggle .bars::before,.nav-toggle .bars::after{content:'';position:absolute;left:0;display:block;width:18px;height:2px;background:var(--navy);border-radius:2px;transition:transform .2s ease;}
.nav-toggle .bars::before{top:-6px;} .nav-toggle .bars::after{top:6px;}
.nav-toggle.open .bars{background:transparent;}
.nav-toggle.open .bars::before{transform:translateY(6px) rotate(45deg);}
.nav-toggle.open .bars::after{transform:translateY(-6px) rotate(-45deg);}
.site-menu{display:none;flex-direction:column;border-top:1px solid var(--line);margin:8px -18px 2px;padding:6px 18px 2px;}
.site-menu.open{display:flex;}
.site-menu a{color:var(--ink);font-weight:600;font-size:14.5px;text-decoration:none;padding:11px 2px;}
@media (min-width:768px){.site-links{display:flex;}.nav-toggle{display:none;}}
.brand{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:20px;color:var(--navy);letter-spacing:-.02em;}
.brand .x{color:var(--orange);}
.exit{font-size:12px;color:var(--muted);background:none;border:none;padding:11px 8px;margin:-11px -8px;}
.lang-b{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font-weight:800;font-size:12px;color:var(--navy);cursor:pointer;}
/* ข้อความใน CSS content ต้องสลับภาษาผ่าน body.en */
body.en .pkg.pop::after{content:'Popular';}
body.en .tt-bg.empty::after{content:'Tap to add photo';}
body.en .tt-bg.vidempty::after{content:'Tap to add video';}
/* stepper วงกลม: ✓ ผ่านแล้ว (บรอนซ์) · เลขวงทึบ = ขั้นปัจจุบัน (เนวี) · วงโปร่ง = ยังไม่ถึง */
.rail{display:flex;align-items:center;gap:6px;}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;flex:0 0 auto;transition:background .2s,color .2s;}
.rdot.done{background:var(--green);color:#fff;}
.rdot.cur{background:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(14,51,97,.12);}
.rdot.todo{background:#fff;border:1.5px solid var(--line);color:var(--ink-40);}
.rl{flex:1;height:3px;border-radius:2px;background:var(--line);transition:background .2s;}
.rl.done{background:var(--green);}

.canvas{flex:1 1 auto;min-height:0;position:relative;display:flex;flex-direction:column;align-items:center;padding:14px 14px 14px;overflow:hidden;}
.canvas-head{flex:0 0 auto;width:100%;text-align:center;margin-bottom:14px;}
.canvas-head h1{font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:800;font-size:19px;color:var(--navy);line-height:1.12;}
.canvas-head p{font-size:13px;color:var(--muted);margin-top:3px;}
.canvas-body{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}

/* แถบปุ่ม ก่อนหน้า/ถัดไป ด้านล่าง (แทนปุ่มลอยกลม) */
/* แถบปุ่มล่างแบบ minimal: ไม่มีกล่อง/เส้นคั่น — สิ่งจำเป็นคือตำแหน่งล่าง+ความสูงกด ≥44px ไม่ใช่แถบขาว */
.actbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px calc(14px + env(safe-area-inset-bottom));}
.btn-prev{flex:0 0 auto;background:none;border:none;color:var(--muted);border-radius:12px;padding:13px 14px;font-weight:800;font-size:14px;}
.btn-next{margin-left:auto;flex:0 0 auto;background:var(--navy);border:none;color:#fff;border-radius:12px;padding:13px 26px;font-weight:800;font-size:14px;box-shadow:0 6px 16px -6px rgba(14,51,97,.45);}
.btn-next:disabled{opacity:.4;box-shadow:none;}
.btn-prev[hidden],.btn-next[hidden]{display:none;}
.actbar[hidden]{display:none;}

/* format pick */
/* กล่องคู่ หมวด/ชนิด บรรทัดเดียว + แผงตัวเลือกกางใต้ (accordion) */
.pick2{display:flex;gap:10px;width:100%;margin-bottom:10px;flex:0 0 auto;}
.pk-box{flex:1;min-width:0;display:flex;align-items:center;gap:8px;background:var(--white);border:1.5px solid var(--line);border-radius:14px;padding:10px 13px;font-family:inherit;text-align:left;min-height:54px;cursor:pointer;transition:border-color .15s,background .15s;box-shadow:0 2px 8px -4px rgba(14,51,97,.15);}
.pk-num{width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
/* กระพริบเรียกสายตาจนกว่าจะเปิดดูครั้งแรก แล้วหยุดเอง */
.pk-box.nudge{border-color:var(--orange);animation:pkpulse 1.8s ease-in-out infinite;}
@keyframes pkpulse{0%,100%{box-shadow:0 0 0 0 rgba(201,134,76,0);}50%{box-shadow:0 0 0 6px rgba(201,134,76,.22);}}
.pk-box .pk-lbl{font-size:11px;font-weight:800;color:var(--muted);flex:0 0 auto;}
.pk-box .pk-val{flex:1;min-width:0;font-size:13.5px;font-weight:800;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pk-box .pk-ch{color:var(--muted);font-size:11px;transition:transform .18s;flex:0 0 auto;}
.pk-box.open{border-color:var(--orange);background:#FFF7EE;}
.pk-box.open .pk-ch{transform:rotate(180deg);}
/* dropdown ลอยทับเนื้อหา (ไม่ดันจอลง) + backdrop แตะข้างนอกเพื่อปิด */
.pick2-wrap{position:relative;width:100%;flex:0 0 auto;}
.pk-panel{position:absolute;top:calc(100% - 4px);left:0;right:0;z-index:30;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;box-shadow:0 16px 38px -12px rgba(14,51,97,.32);max-height:300px;overflow-y:auto;}
.pk-back{position:fixed;inset:0;z-index:29;background:transparent;}
/* กล่องใหญ่ห่อทั้งชุด (การ์ด+หัวข้อ+คำอธิบาย) — สีขาวตัดกับพื้นครีมของหน้า */
.fmt-wrap{width:100%;align-self:center;background:var(--white);border:1px solid var(--line);border-radius:22px;padding:14px 14px 16px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}
.fmt-pick{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;width:100%;}
/* การ์ดแบบ image-top / text-bottom ชิดซ้าย · ขอบบาง · เลือกแล้วขยาย+เงา+ติ๊ก */
/* เลเยอร์สีสลับ: กล่องนอกขาว → การ์ดครีม → ช่องรูปขาว (เห็นชั้นชัดแบบไม่ต้องพึ่งขอบหนา) */
.fmt-card{position:relative;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:10px 10px 13px;text-align:left;cursor:pointer;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;}
.fmt-card:active{transform:scale(.98);}
.fmt-card.on{border-color:var(--green);background:#EFF8F2;transform:scale(1.03);box-shadow:0 10px 26px -10px rgba(14,51,97,.28);}
.fmt-card .pick{position:absolute;top:10px;right:10px;z-index:2;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;transition:background .15s,border-color .15s,color .15s;}
.fmt-card.on .pick{background:var(--green);border-color:var(--green);color:#fff;}
.fmt-card .mini{display:block;margin-bottom:10px;background:var(--white);border:1px solid #E9ECF2;border-radius:12px;padding:8px;}
.fmt-card.on .mini{border-color:#CFE8D9;}
/* the preview content is absolute-positioned with fixed-px text, so it cannot
   reflow at a narrower width — scale the WHOLE totem instead (stays pixel-correct). */
.tmini{width:100%;overflow:hidden;}
.tmini .totem{width:200px;transform-origin:top left;}
.tsum{width:64px;height:122px;overflow:hidden;flex:0 0 auto;}
.tsum .totem{width:200px;transform:scale(0.32);transform-origin:top left;}
.fmt-card .nm{font-weight:800;font-size:14px;color:var(--ink);padding:0 3px;}
.fmt-card .ds{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;padding:0 3px;}
.fmt-card .free{display:inline-block;margin-top:5px;background:#e9f7ef;color:var(--green);font-size:10px;font-weight:700;padding:2px 9px;border-radius:7px;}
.af-note{font-size:12.5px;color:var(--ink-40);line-height:1.55;margin-top:16px;max-width:380px;width:100%;align-self:center;text-align:left;}   /* real /offer format description, switches per selection */

/* แพ็กเกจ — เลเยอร์เดียวกับ step 1: กล่องขาว → การ์ดครีม → เลือกแล้วอมส้ม+ขยาย */
.pkg-wrap{width:100%;margin:0 auto;background:var(--white);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}
.pkg{display:flex;align-items:center;gap:11px;background:var(--cream);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;}
.pkg:active{transform:scale(.98);}
.pkg.on{border-color:var(--green);background:#EFF8F2;transform:scale(1.02);box-shadow:0 10px 24px -10px rgba(14,51,97,.22);}
.pkg .pick{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:transparent;flex:0 0 auto;transition:background .15s,border-color .15s,color .15s;}
.pkg.on .pick{background:var(--green);border-color:var(--green);color:#fff;}
.pkg .tier{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:15px;color:var(--navy);min-width:62px;}
.pkg .feat{flex:1;font-size:12px;color:var(--muted);line-height:1.35;}
.pkg .pr{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:15px;color:var(--orange-strong);white-space:nowrap;text-align:right;}
.pkg .pr small{display:block;font-size:10px;color:var(--muted);font-weight:600;}
.pkg.pop{position:relative;} .pkg.pop::after{content:'นิยม';position:absolute;top:-8px;right:12px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;}
.free-card{background:var(--white);border:2px solid #9fd9b4;border-radius:16px;padding:22px 18px;text-align:center;max-width:320px;}
.free-card .big{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:30px;color:var(--green);}
.free-card p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5;}
.free-card .until{margin-top:12px;background:#e9f7ef;color:var(--green);font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;display:inline-block;}

.cats{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;flex:0 0 auto;width:100%;scrollbar-width:thin;scrollbar-color:var(--orange-soft) transparent;}
.cats::-webkit-scrollbar{height:5px;}
.cats::-webkit-scrollbar-thumb{background:var(--orange-soft);border-radius:3px;}
.cats::-webkit-scrollbar-track{background:transparent;}
.cats[data-sx="r"]{-webkit-mask-image:linear-gradient(90deg,#000 80%,transparent);mask-image:linear-gradient(90deg,#000 80%,transparent);}
.cats[data-sx="l"]{-webkit-mask-image:linear-gradient(90deg,transparent,#000 20%);mask-image:linear-gradient(90deg,transparent,#000 20%);}
.cats[data-sx="lr"]{-webkit-mask-image:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent);mask-image:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent);}
.cat{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:10px 14px;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap;}
.cat.on{border-color:var(--green);background:var(--green);color:#fff;}

/* ===== LIVE PREVIEW (.tt-* / .pm-*) — copied verbatim from /offer ===== */
.totem-wrap{display:flex;justify-content:center;}
.totem{width:200px;text-align:left;}   /* isolate preview from any container's text-align (e.g. centered cards) */
.tt-screen{width:100%;aspect-ratio:9/16;border:3px solid #0c111c;border-bottom:none;border-radius:9px 9px 0 0;position:relative;overflow:hidden;background:#0a0c10;display:grid;grid-template-rows:auto 1fr auto;}
.tt-stage{position:relative;overflow:hidden;}
.tt-topbar{background:#0e1d3a;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 9px;height:23px;border-bottom:1px solid rgba(255,255,255,0.06);z-index:10;}
.tt-time{font-size:8px;font-weight:600;color:#fff;justify-self:start;letter-spacing:0.05em;font-variant-numeric:tabular-nums;}
.tt-tdot{width:3px;height:3px;border-radius:50%;background:#6DD5E8;box-shadow:0 0 4px #6DD5E8;justify-self:center;animation:tt-dotpulse 2s ease-in-out infinite;}
.tt-weather{justify-self:end;display:flex;align-items:center;gap:3px;font-size:7px;color:rgba(255,255,255,0.6);font-weight:500;}
.tt-weather .ic{font-size:9px;} .tt-weather b{color:#fff;font-weight:600;}
.tt-bottombar{background:#0e1d3a;height:16px;border-top:1px solid rgba(255,255,255,0.06);overflow:hidden;display:flex;align-items:center;}
.tt-marq{display:flex;white-space:nowrap;animation:tt-marquee 20s linear infinite;}
.tt-marq span{font-size:6.5px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:0.22em;text-transform:uppercase;padding:0 13px;}
.tt-marq b{color:#6DD5E8;font-size:5px;align-self:center;}
@keyframes tt-marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes tt-dotpulse{0%,100%{opacity:1}50%{opacity:.3}}
.tt-base{width:100%;height:26px;background:linear-gradient(180deg,#1b2740 0%,#05080d 100%);border-top:2px solid #36486a;border-radius:0 0 9px 9px;box-shadow:inset 0 2px 5px -1px rgba(0,0,0,0.5), 0 14px 24px -8px rgba(0,0,0,0.5);}
.tt-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#11151c;}
video.tt-bg{object-fit:cover;width:100%;height:100%;}
.tt-bg.empty::after{content:'แตะเพื่อใส่รูป';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3a4456;font-size:9px;}
.tt-bg.vidempty::after{content:'แตะเพื่อใส่วิดีโอ';}
.tt-avail{font-size:7px;color:rgba(255,255,255,.62);margin-top:3px;font-weight:600;letter-spacing:.02em;}
.tt-grad{position:absolute;inset:auto 0 0 0;height:72%;background:linear-gradient(0deg,rgba(5,6,8,0.92) 0%,rgba(5,6,8,0.35) 50%,transparent 100%);}
.tt-menu{position:absolute;top:12px;left:12px;z-index:6;display:flex;align-items:center;gap:6px;background:rgba(8,12,22,0.55);border:1px solid rgba(255,255,255,0.42);color:#fff;font-size:8.5px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:7px 11px;border-radius:9px;box-shadow:0 0 0 2px rgba(109,213,232,0.4), 0 6px 14px rgba(0,0,0,0.45);backdrop-filter:blur(8px);}
.tt-content{position:absolute;left:12px;right:12px;bottom:12px;z-index:5;display:flex;flex-direction:column;align-items:stretch;gap:7px;}
.tt-content .tt-eyebrow{align-self:flex-start;}
.tt-content .hot:first-of-type{margin-top:0;}
.tt-content .tt-cta-wrap{margin-top:4px;}
.tt-eyebrow{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid rgba(255,255,255,0.4);border-radius:20px;background:rgba(8,12,22,0.35);font-size:7px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;}
.tt-eyebrow::before{content:'';width:4px;height:4px;border-radius:50%;background:#6DD5E8;box-shadow:0 0 5px #6DD5E8;animation:tt-eb-pulse 2.2s ease-in-out infinite;}
.tt-title{font-family:'Mitr',sans-serif;font-weight:600;font-size:20px;line-height:1.12;text-transform:uppercase;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);}
.tt-price{display:flex;align-items:baseline;gap:5px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:23px;color:#FBD7A8;line-height:1;text-shadow:0 1px 7px rgba(0,0,0,0.6);}
.tt-sub{font-size:9px;line-height:1.4;color:rgba(255,255,255,0.88);text-shadow:0 1px 4px rgba(0,0,0,0.55);}
.tt-dock{position:absolute;left:12px;right:12px;bottom:12px;z-index:6;display:grid;grid-template-columns:1fr;gap:5px;}
.tt-cta{width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(8,12,22,0.5);border:1px solid rgba(255,255,255,0.4);color:#fff;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 11px;border-radius:8px;backdrop-filter:blur(4px);}
.tt-cta.sec{font-weight:600;border-color:rgba(255,255,255,0.26);}
.tt-cta.add{border-style:dashed;border-color:rgba(109,213,232,0.7);color:#6DD5E8;justify-content:center;}
@keyframes tt-eb-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.55}}
.tt-imgdots{position:absolute;top:9px;right:11px;z-index:6;display:flex;gap:3px;}
.tt-imgdots i{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45);} .tt-imgdots i.on{background:#fff;}
/* menu-ad (catalog) preview — copied from /offer .pm-* */
.pm-screen{width:100%;aspect-ratio:9/16;border:3px solid #0c111c;border-bottom:none;border-radius:9px 9px 0 0;overflow:hidden;background:linear-gradient(165deg,#050608,#0e1d3a);display:flex;flex-direction:column;position:relative;}
.pm-head{flex-shrink:0;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;padding:11px 11px 9px;border-bottom:1px solid rgba(255,255,255,.08);}
.pm-back{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;}
.pm-title{font-family:'Anton',sans-serif;font-weight:400;font-size:15px;color:#fff;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-lang{padding:3px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:7.5px;font-weight:700;border-radius:5px;letter-spacing:1px;}
.pm-body{flex:1;overflow-y:auto;padding:10px 11px 14px;scrollbar-width:none;}
.pm-body::-webkit-scrollbar{width:0;}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pm-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;}
.pm-card-img{width:100%;height:60px;background-size:cover;background-position:center;background-color:#11151c;}
.pm-card-img.pm-empty{display:flex;align-items:center;justify-content:center;border:1.5px dashed rgba(109,213,232,.55);box-sizing:border-box;}
.pm-addimg{font-size:8px;font-weight:800;color:#9fd3df;letter-spacing:.02em;white-space:nowrap;}
.pm-card-info{padding:7px 8px 9px;}
.pm-card-name{font-size:9.5px;font-weight:700;color:#fff;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pm-card-sub{font-size:7.5px;font-weight:500;color:rgba(255,255,255,.6);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-card-meta{margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#FBD7A8;letter-spacing:.3px;font-weight:700;}

/* watermark บนจอที่เป็นตัวอย่างเท่านั้น (จอ "ของฉัน" ไม่มี)
   ตัวอักษรอยู่บนแถบคาดเข้มจางๆ — อ่านออกทั้งบนรูปสว่างและรูปมืด */
.tt-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;pointer-events:none;}
.tt-wm i{display:block;width:170%;text-align:center;font-style:normal;background:rgba(8,12,22,.32);backdrop-filter:blur(2px);padding:7px 0;font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,.82);text-shadow:0 1px 2px rgba(0,0,0,.5);white-space:nowrap;}
/* hotspots */
.hot{cursor:pointer;outline:2px dashed transparent;outline-offset:2px;transition:outline-color .15s,background .15s;border-radius:7px;position:relative;}
.hot:hover,.hot:focus-visible{outline-color:#6DD5E8;background:rgba(109,213,232,.12);}
.hot .chip{position:absolute;top:-9px;right:-6px;background:#6DD5E8;color:#06222b;font-size:8.5px;font-weight:800;border-radius:6px;padding:1px 5px;opacity:0;transition:opacity .15s;}
.hot:hover .chip,.hot:focus-visible .chip{opacity:1;}
.tap-hint{flex:0 0 auto;margin-top:8px;font-size:12px;color:var(--orange-strong);font-weight:600;}
/* สองจอวางเคียงกัน ไม่บังกัน — ใบที่เลือกเต็มขนาดชิดขอบฝั่งตัวเอง ใบที่ไม่ได้เลือกย่อ 80% ยึดขอบนอก */
.deck{position:relative;width:100%;align-self:center;}
.deck-card{width:200px;transition:opacity .2s ease,top .2s ease,transform .2s ease;}
.deck-card.slot-left{position:relative;z-index:1;transform-origin:top left;}    /* กรอกข้อมูล — ชิดซ้าย */
.deck-card.slot-right{position:absolute;right:0;top:0;z-index:1;transform-origin:top right;}   /* ตัวอย่าง — ชิดขวา */
.deck-card.on{top:0;z-index:3;transform:scale(1);}
.deck-card:not(.on){top:14px;transform:scale(.8);cursor:pointer;}
.deck-card:not(.on)::after{content:'';position:absolute;inset:0;background:rgba(244,246,250,.5);border-radius:9px 9px 0 0;z-index:1;}
.peek-tag{display:none;position:absolute;left:50%;bottom:12px;transform:translateX(-50%);white-space:nowrap;font:800 11.5px/1 'IBM Plex Sans Thai','Nunito',system-ui,sans-serif;color:var(--orange-strong);background:rgba(255,255,255,.94);padding:7px 12px;border-radius:12px;box-shadow:0 3px 10px -3px rgba(0,0,0,.3);cursor:pointer;z-index:2;}
.deck-card:not(.on) .peek-tag{display:block;}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(8,12,22,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;}
.scrim.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--white);border-radius:20px 20px 0 0;padding:8px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:41;max-height:82dvh;overflow-y:auto;}
.sheet.open{transform:translateY(0);}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
.sheet h3{font-family:'Mitr','IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:17px;color:var(--navy);margin-bottom:3px;}
.sheet .hint{font-size:12.5px;color:var(--muted);margin-bottom:13px;}
.fld{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;}
.fld:focus{outline:none;border-color:var(--orange);}
.sheet-save{width:100%;margin-top:15px;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;}
.sheet-rm{width:100%;margin-top:8px;background:none;color:#b23b2e;border:none;padding:8px;font-weight:600;font-size:13px;}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.img-cell{aspect-ratio:1;border-radius:11px;background-size:cover;background-position:center;position:relative;border:1.5px solid var(--line);}
.img-cell .rm{position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;border:none;font-size:13px;}
.img-add{aspect-ratio:1;border:1.5px dashed var(--orange);border-radius:11px;background:#fffdf8;color:var(--orange-strong);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:700;font-family:inherit;}
.img-add:disabled{opacity:.4;border-style:solid;color:var(--muted);border-color:var(--line);background:var(--cream);}
.cap-note{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;} .cap-note b{color:var(--orange-strong);}
.upsell{margin-top:10px;background:#fff7ec;border:1.5px solid var(--orange);border-radius:11px;padding:10px 12px;font-size:12.5px;display:flex;align-items:center;gap:8px;justify-content:space-between;color:var(--orange-strong);}
.upsell button{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;}
/* dropdown เลือกปุ่ม CTA (กล่องเดียว + กางรายการพร้อมคำอธิบาย) */
.dd-box{width:100%;display:flex;align-items:center;gap:10px;background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:12px 14px;text-align:left;font-family:inherit;cursor:pointer;transition:border-color .15s,background .15s;}
.dd-box.open{border-color:var(--orange);background:#FFF7EE;}
.dd-box .t{flex:1;min-width:0;}
.dd-box .t b{display:block;font-size:14.5px;color:var(--ink);}
.dd-box .t small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;}
.dd-box .ch{color:var(--muted);font-size:11px;transition:transform .18s;flex:0 0 auto;}
.dd-box.open .ch{transform:rotate(180deg);}
.dd-list{border:1px solid var(--line);border-radius:14px;margin-top:8px;overflow:hidden;background:#fff;}
.dd-opt{width:100%;display:block;text-align:left;padding:11px 14px;background:#fff;border:none;border-bottom:1px solid var(--line);font-family:inherit;cursor:pointer;}
.dd-opt:last-child{border-bottom:none;}
.dd-opt b{display:block;font-size:14px;color:var(--ink);}
.dd-opt small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;}
.dd-opt.on{background:#EFF8F2;} .dd-opt.on b{color:var(--green);}
.dd-opt:disabled{opacity:.45;cursor:default;}
/* จุด toggle สลับรูปใต้ตัวอย่างในหน้าสรุป */
.sum-dots{display:flex;justify-content:center;gap:2px;margin-top:6px;}
.sdot{width:32px;height:32px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
.sdot::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--line);transition:background .15s,transform .15s;}
.sdot.on::before{background:var(--orange);transform:scale(1.25);}
.cta-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cta-opt{border:1.5px solid var(--line);border-radius:11px;padding:11px;font-size:13px;font-weight:600;color:var(--ink);background:#fff;text-align:left;}
.cta-opt.on{border-color:var(--green);background:#EFF8F2;}
.cta-opt.lk{opacity:.45;cursor:default;}
.sum{width:100%;}
/* step 4: สองกล่อง — จอ preview กล่องนึง · ตารางสรุป+เงื่อนไขอีกกล่องนึง */
.sum-prev{background:var(--white);border:1px solid var(--line);border-radius:22px;padding:20px 14px 16px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);width:100%;}
.sum-right{background:var(--white);border:1px solid var(--line);border-radius:22px;padding:6px 16px 16px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}
.sum-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.sum-row .k{color:var(--muted);} .sum-row .v{font-weight:700;color:var(--ink);}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px;}
.sum-total .k{font-weight:700;} .sum-total .v{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:24px;color:var(--orange-strong);text-align:right;}
.sum-total .v small{display:block;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-size:11.5px;color:var(--muted);font-weight:600;text-align:right;margin-top:2px;}
/* ติ๊กยอมรับเงื่อนไขก่อนส่ง — ไม่ติ๊ก = ปุ่มส่งกดไม่ได้ */
.agree{display:flex;gap:10px;align-items:flex-start;margin-top:16px;font-size:12.5px;color:var(--muted);line-height:1.55;cursor:pointer;}
.agree input{width:20px;height:20px;margin-top:1px;flex:0 0 auto;accent-color:var(--green);cursor:pointer;}
.agree a{color:var(--orange-strong);font-weight:700;}
.stp{display:flex;align-items:center;gap:12px;}
.stp button{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--navy);font-size:17px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stp button:disabled{opacity:.4;cursor:default;}
.stp b{min-width:20px;text-align:center;font-weight:800;color:var(--ink);font-size:15px;}
.types{display:flex;align-items:center;gap:7px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;}
.types-lbl{flex:0 0 auto;font-size:12px;font-weight:800;color:var(--muted);margin-right:2px;}
.types::-webkit-scrollbar{display:none;}
.typ{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:10px 14px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;white-space:nowrap;}
.typ.on{border-color:var(--green);background:#EFF8F2;color:var(--navy);}
.fld-lbl{display:block;font-size:12px;font-weight:700;color:var(--ink);margin:14px 0 6px;}
.free-tog{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;}
.word-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.wchip{border:1.5px solid var(--line);background:#fff;border-radius:18px;padding:10px 14px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;}
.wchip.on{border-color:var(--green);background:#EFF8F2;color:var(--navy);}
.ulbl{font-size:12px;font-weight:700;color:var(--ink);margin:14px 0 0;}
.sheet-next{width:100%;margin-top:12px;background:#fff;border:1.5px solid var(--navy);color:var(--navy);border-radius:12px;padding:12px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;}
.ex-head{font-weight:800;font-size:13px;color:var(--orange-strong);margin:6px 0 10px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
.ex-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ex-add{border:1.5px dashed var(--orange);background:#fffdf8;color:var(--orange-strong);border-radius:10px;padding:9px 14px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;}
.rrm{width:44px;height:44px;border-radius:8px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-size:13px;flex:0 0 auto;cursor:pointer;}
.auto-note{background:#eafaf0;border:1.5px solid #bfe6cf;color:#1f7a4d;border-radius:11px;padding:10px 13px;font-size:12.5px;font-weight:600;margin-bottom:10px;}
.mk-seg{display:flex;gap:6px;background:#eef0f4;border-radius:11px;padding:3px;margin-bottom:12px;}
.mk{flex:1;border:none;background:none;border-radius:8px;padding:11px 8px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--muted);cursor:pointer;}
.mk.on{background:#fff;color:var(--navy);box-shadow:0 1px 5px rgba(16,24,40,.14);}
.vid-box{display:flex;align-items:center;gap:12px;background:#0f1420;color:#fff;border-radius:12px;padding:16px;font-size:14px;font-weight:700;}
.vid-box .vic{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;}
.vid-pick{width:100%;border:1.5px dashed var(--orange);border-radius:12px;background:#fffdf8;color:var(--orange-strong);font-weight:800;font-size:14px;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.vid-change{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:8px;padding:11px 14px;font-size:12px;font-weight:700;cursor:pointer;flex:0 0 auto;}
.tt-play{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.85);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px;z-index:3;}
.fin{text-align:center;} .fin .done-check{width:60px;height:60px;border-radius:50%;background:#e9f7ef;color:var(--green);font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.proto-tag{position:fixed;top:6px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;padding:3px 10px;border-radius:8px;z-index:50;opacity:.8;}
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;box-shadow:0 8px 22px -6px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translate(-50%,0);}
/* lightbox — แตะรูปที่อัพโหลดเพื่อดูเต็มจอ (‹ › เลื่อน · ✕ ปิด · Esc/ลูกศรได้) */
.lb{position:fixed;inset:0;background:rgba(5,8,14,.88);z-index:70;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:86%;max-height:82%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.55);}
.lb-x{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;padding-bottom:3px;}
.lb-nav.l{left:14px;} .lb-nav.r{right:14px;}
.lb-cnt{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:12.5px;font-weight:700;opacity:.85;font-variant-numeric:tabular-nums;}
.img-cell{cursor:zoom-in;}

/* ═══ RESPONSIVE LAYER (ไฟล์ทดลอง) — ฐานมือถือคงเดิม 100% · จอกว้างได้ของเพิ่มอย่างเดียว ═══ */
.s3-wrap{display:flex;flex-direction:column;align-items:center;}   /* base = เหมือน inline เดิม */
/* มือถือ: wrapper ฝั่งซ้ายล่องหน — ลำดับตาม DOM (หัวข้อ → ตัวเลือก → จอ) */
.s3-left{display:contents;}
.tmini .totem{transform-origin:top center;margin:0 auto;}   /* จอตัวอย่างย่อ/ขยายจากกึ่งกลาง อยู่กลางกรอบเสมอ */

/* ── แท็บเล็ต ≥768px: ขยายคอลัมน์ + ฉากหลังตั้งใจขึ้น ── */
@media (min-width:768px){
  body{background:linear-gradient(160deg,#E9EDF5,#D9E0EB);}
  .app{max-width:640px;box-shadow:0 24px 70px -28px rgba(14,51,97,.35);}
  .fmt-wrap,.pkg-wrap{max-width:560px;}
  .sum{max-width:440px;}
}

/* ── Desktop ≥1024px: หน้าเว็บเต็มจอแบบ landing page (ไม่ใช่หน้าต่างแอปลอย) + step 3 สองคอลัมน์ + sheet เป็น dialog ── */
@media (min-width:1024px){
  html,body{height:auto;overflow:auto;}
  body{background:var(--cream);}
  .app{max-width:none;height:auto;min-height:100dvh;margin:0;border-radius:0;box-shadow:none;}
  /* แถบขาวบน-ล่างกว้างเต็มจอ แต่ของข้างในคุมเป็นคอลัมน์ 1200 เหมือน nav-wrap เว็บจริง */
  .appbar{padding:13px max(24px,calc((100% - 1200px)/2));border-bottom:1px solid var(--line);}
  .appbar-top{margin-bottom:0;}
  .actbar{padding-inline:max(24px,calc((100% - 920px)/2));}   /* ปุ่มเกาะขอบคอลัมน์เนื้อหา ไม่ลอยไปสุดจอ */
  /* stepper ลงมาจาก header: ลอยบนพื้นครีม กว้างเท่าคอลัมน์เนื้อหา 920 */
  .railbar{background:transparent;border-bottom:none;max-width:920px;margin:26px auto 0;padding:0 24px;width:100%;}
  .canvas{overflow:visible;padding:18px 24px;}
  .canvas-body{overflow:visible !important;}
  .fmt-wrap{max-width:720px;}
  /* step 4: สองฝั่งเท่ากัน คนละกล่อง — จอ preview ตรึงซ้าย · ตารางสรุป+เงื่อนไขขวา (มือถือเรียงแนวตั้งเหมือนเดิม) */
  .sum{max-width:920px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  .sum>div:first-child{position:sticky;top:24px;margin-bottom:0;background:var(--white);border:1px solid var(--line);border-radius:22px;padding:24px 22px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}
  .sum-right{background:var(--white);border:1px solid var(--line);border-radius:22px;padding:4px 22px 14px;box-shadow:0 8px 24px -14px rgba(14,51,97,.18);}

  .s3-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;max-width:920px;background:none;border:none;box-shadow:none;padding:0;}

/* ── ราคาแพ็กเกจดึงสดจาก ratecard-sme ใน Sanity (แหล่งเดียวกับหน้า Ratecard บนเว็บ — ห้าม hardcode เพิ่ม)
   ค่าใน PKGS ด้านบนเป็นแค่ fallback ตอนออฟไลน์ · dataset เปิดอ่าน public จึง fetch ตรงได้ ไม่มี key ── */
(function loadRatecard(){
  const q=encodeURIComponent('*[_id=="ratecard-sme"][0]{rows}');
  fetch('https://awjj9g8u.apicdn.sanity.io/v2024-01-01/data/query/production?query='+q)

    .then(({result})=>{
      if(!result||!result.rows)return;

        const po=poster&&poster.cells&&poster.cells[i];
        if(po){const n=parseInt(String(po.text||'').replace(/[^\d]/g,''),10);if(n)p.maxImg=n;}
        const vc=video&&video.cells&&video.cells[i];
        if(vc)p.vid=vc.type==='check';
        const sec=disp&&disp.cells&&disp.cells[i]&&disp.cells[i].big;
        if(sec)  {p.feat=`รูป ${p.maxImg} ใบ${p.vid?' หรือ วิดีโอ':''} · เล่น ${sec} วิ`;
                  p.featEn=`${p.maxImg} photo${p.maxImg>1?'s':''}${p.vid?' or video':''} · ${sec}s play`;}

      if(S.step===2||S.step===4)renderStep();

function fitMini(){
  const cb=document.querySelector('.canvas-body'),minis=[...document.querySelectorAll('.tmini')];
  if(!cb||!minis.length)return;
  const note=document.querySelector('.af-note'),nm=document.querySelector('.fmt-card .nm'),ds=document.querySelector('.fmt-card .ds'),hd=cb.querySelector('.canvas-head');
  /* desktop เลื่อนทั้งหน้า → canvas-body สูงตามเนื้อหา ห้ามใช้ตรงๆ: หักด้วยพื้นที่จอจริงที่เหลือใต้ canvas-body ด้วย */
  const avail=Math.max(180,innerHeight-cb.getBoundingClientRect().top-((document.querySelector('.actbar')&&!document.querySelector('.actbar').hidden)?document.querySelector('.actbar').offsetHeight:0)-16);
  const budget=Math.max(180,Math.min(cb.clientHeight,avail)-(note?note.offsetHeight+10:0)-(nm?nm.offsetHeight:0)-(ds?ds.offsetHeight:0)-(hd?hd.offsetHeight+14:0)-96);
  let s=Infinity;
  /* responsive: หักค่า padding ของกรอบ (clientWidth รวม padding) + เพดานขยาย 1.25x กันจอบานเกินการ์ดบน desktop */
  minis.forEach(t=>{const tm=t.querySelector('.totem');if(!tm)return;tm.style.transform='none';const nh=tm.offsetHeight||382;s=Math.min(s,(t.clientWidth-16)/200,budget/nh,1.25);});
  minis.forEach(t=>{const tm=t.querySelector('.totem');if(!tm)return;const nh=tm.offsetHeight||382;tm.style.transform='scale('+s+')';t.style.height=Math.round(nh*s)+'px';});
}
window.addEventListener('resize',()=>{if(S.step===1)fitMini();});
window.addEventListener('load',()=>{if(S.step===1)fitMini();});

      body=`<div class="auto-note">✅ ${L('ปุ่มนี้เปิดหน้า'+(S.cta==='viewStore'?'ร้าน/แบรนด์':'โฆษณา')+'ของคุณให้อัตโนมัติจากข้อมูลที่กรอก','This button automatically opens your '+(S.cta==='viewStore'?'store/brand':'ad')+' page from the info you filled in')}</div><label class="fld-lbl" for="aLink">${L('ลิงก์ปลายทาง (ถ้ามี)','Destination link (optional)')}</label><input class="fld" type="url" inputmode="url" id="aLink" value="${esc(A.link)}" placeholder="https://...">`;
    }else if(S.cta==='viewListing'){
      body=`<div class="ex-head">📋 ${L('สเปกประกาศ','Listing specs')}</div>
        <div class="row2"><div><label class="fld-lbl" for="aArea" style="margin-top:0">${L('พื้นที่ (ตร.ม.)','Area (sqm)')}</label><input class="fld" id="aArea" value="${esc(A.area)}" placeholder="${L('เช่น 35','e.g. 35')}" inputmode="numeric"></div><div><label class="fld-lbl" for="aFloor" style="margin-top:0">${L('ชั้น','Floor')}</label><input class="fld" id="aFloor" value="${esc(A.floor)}" placeholder="${L('เช่น 12','e.g. 12')}"></div></div>
        <div class="row3"><div><label class="fld-lbl" for="aBed" style="margin-top:0">${L('ห้องนอน','Beds')}</label><input class="fld" id="aBed" value="${esc(A.bed)}" inputmode="numeric"></div><div><label class="fld-lbl" for="aBath" style="margin-top:0">${L('ห้องน้ำ','Baths')}</label><input class="fld" id="aBath" value="${esc(A.bath)}" inputmode="numeric"></div><div><label class="fld-lbl" for="aPark" style="margin-top:0">${L('จอดรถ','Parking')}</label><input class="fld" id="aPark" value="${esc(A.park)}"></div></div>
        <label class="fld-lbl">${L('การตกแต่ง','Furnishing')}</label>${sel('aFurnish',A.furnish,[{v:'',l:L('— เลือก —','— select —')},{v:'ห้องเปล่า',l:L('ห้องเปล่า','Unfurnished')},{v:'ตกแต่งบางส่วน',l:L('ตกแต่งบางส่วน','Partly furnished')},{v:'ตกแต่งครบ',l:L('ตกแต่งครบ','Fully furnished')},{v:'บิวท์อิน',l:L('บิวท์อิน','Built-in')}])}`;
    }else if(S.cta==='viewMenu'){
      body=`<div class="ex-head">🍽️ ${L('รายการเมนู','Menu items')}</div><div id="rowsBox">${rowsHtml(A.menu)}</div><button class="ex-add" onclick="addRow()">＋ ${L('เพิ่มรายการ','Add item')}</button>
        <label class="fld-lbl" for="aMenuLink">${L('หรือ ลิงก์/รูปเมนูภายนอก','or an external menu link/photo')}</label><input class="fld" type="url" inputmode="url" id="aMenuLink" value="${esc(A.menuLink)}" placeholder="https://...">`;
    }else if(S.cta==='order'){
      body=`<div class="ex-head">🛒 ${L('รายการสั่งซื้อ','Order items')}</div><div id="rowsBox">${rowsHtml(A.order)}</div><button class="ex-add" onclick="addRow()">＋ ${L('เพิ่มรายการ','Add item')}</button>
        <div class="fld-lbl">${L('รับออเดอร์แบบไหน','How do you take orders?')}</div><div class="word-chips">${[['dinein','🍽️ '+L('ทานที่ร้าน','Dine-in')],['pickup','🛍️ '+L('รับเอง','Pickup')],['delivery','🛵 '+L('เดลิเวอรี','Delivery')]].map(f=>`<button class="wchip ${A.ful.includes(f[0])?'on':''}" onclick="toggleFul('${f[0]}')">${f[1]}</button>`).join('')}</div>
        <div class="row2"><div><label class="fld-lbl" for="aDeliv">${L('ค่าส่ง (บาท)','Delivery fee (THB)')}</label><input class="fld" id="aDeliv" value="${esc(A.deliv)}" placeholder="${L('เช่น 20','e.g. 20')}" inputmode="numeric"></div><div><label class="fld-lbl" for="aMin">${L('ขั้นต่ำ/ออเดอร์ (บาท)','Min order (THB)')}</label><input class="fld" id="aMin" value="${esc(A.min)}" placeholder="${L('เช่น 100','e.g. 100')}" inputmode="numeric"></div></div>`;
    }else if(S.cta==='book'){
      body=`<div class="ex-head">📅 ${L('ตั้งค่าคิวจอง','Booking setup')}</div>
        <div class="row2"><div><label class="fld-lbl">${L('เวลาเปิด','Opens')}</label>${sel('aOpen',A.bkOpen,times.map(t=>({v:t,l:t})))}</div><div><label class="fld-lbl">${L('เวลาปิด','Closes')}</label>${sel('aClose',A.bkClose,times.map(t=>({v:t,l:t})))}</div></div>
        <div class="row2"><div><label class="fld-lbl">${L('ความยาว/คิว','Slot length')}</label>${sel('aSlot',A.bkSlot,[30,45,60,90,120].map(m=>({v:m,l:m+L(' นาที',' min')})))}</div><div><label class="fld-lbl">${L('จองล่วงหน้า','Book ahead')}</label>${sel('aAhead',A.bkAhead,[3,7,14,30].map(d=>({v:d,l:d+L(' วัน',' days')})))}</div></div>
        <label class="fld-lbl" for="aCap">${L('รับกี่คิว/ช่วง (ไม่บังคับ)','Capacity per slot (optional)')}</label><input class="fld" id="aCap" value="${esc(A.cap)}" placeholder="${L('เช่น 3','e.g. 3')}" inputmode="numeric">`;
    }else if(S.cta==='signup'||S.cta==='event'){
      body=`<div class="ex-head">${S.cta==='event'?'🎉 '+L('ข้อมูลอีเวนต์','Event info'):'📝 '+L('ข้อมูลลงทะเบียน','Signup info')}</div>
        <div class="row2"><div><label class="fld-lbl">${L('เริ่ม (วันที่)','Start date')}</label><input class="fld" type="date" id="aEvStart" value="${esc(A.evStart)}"></div><div><label class="fld-lbl">${L('ถึง (วันที่)','End date')}</label><input class="fld" type="date" id="aEvEnd" value="${esc(A.evEnd)}"></div></div>
        <label class="fld-lbl" for="aEvWhen">${L('เวลา / รายละเอียดวัน','Time / day details')}</label><input class="fld" id="aEvWhen" value="${esc(A.evWhen)}" placeholder="${L('เช่น 10:00–17:00','e.g. 10:00–17:00')}">
        <div class="row2"><div><label class="fld-lbl" for="aEvPlace" style="margin-top:0">${L('สถานที่','Venue')}</label><input class="fld" id="aEvPlace" value="${esc(A.evPlace)}"></div><div><label class="fld-lbl" for="aEvCap" style="margin-top:0">${L('จำนวนรับ','Capacity')}</label><input class="fld" id="aEvCap" value="${esc(A.evCap)}" inputmode="numeric"></div></div>
        <label class="fld-lbl" for="aLink">${L('ลิงก์ฟอร์มลงทะเบียน','Signup form link')}</label><input class="fld" type="url" inputmode="url" id="aLink" value="${esc(A.link)}" placeholder="https://...">`;
    }
    html=`<h3>${L('หลังกดปุ่ม','After tap')} · ${c.e||''} ${c.label||''}</h3><p class="hint">${L('หน้าต่าง/ข้อมูลที่ลูกค้าเห็นหลังกดปุ่มบนจอ','What customers see after tapping the button on screen')}</p>${body}<button class="sheet-save" onclick="saveAfter()">${L('บันทึก','Save')}</button>`;
  }
  sh.innerHTML='<div class="grab"></div>'+html;sh.classList.add('open');el('scrim').classList.add('open');
}
function closeSheet(){S.sheet=null;el('sheet').classList.remove('open');el('scrim').classList.remove('open');}
let toastT;function toast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
/* lightbox */
let lbI=0;
function openLb(i){if(!S.images.length)return;lbI=i;updLb();el('lb').classList.add('open');}
function updLb(){lbI=(lbI+S.images.length)%S.images.length;el('lbImg').src=S.images[lbI];el('lbCnt').textContent=(lbI+1)+' / '+S.images.length;const one=S.images.length<2;document.querySelectorAll('.lb-nav').forEach(b=>b.style.display=one?'none':'flex');}
function lbNav(d){lbI+=d;updLb();}
function closeLb(){el('lb').classList.remove('open');}
document.addEventListener('keydown',e=>{if(!el('lb').classList.contains('open'))return;if(e.key==='Escape')closeLb();else if(e.key==='ArrowLeft')lbNav(-1);else if(e.key==='ArrowRight')lbNav(1);});
function esc(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function syncTitleInputs(){if(el('fTitle'))S.title=el('fTitle').value||S.title;if(el('fSub'))S.sub=el('fSub').value;if(el('fPrice'))S.price=el('fPrice').value.replace(/[^0-9]/g,'');if(el('fOrig'))S.origPrice=el('fOrig').value.replace(/[^0-9]/g,'');if(el('fAvail'))S.avail=el('fAvail').value;if(el('fValid'))S.valid=el('fValid').value;}
function setSub(s){syncTitleInputs();S.subcat=s;openSheet('title');renderStep();}
function saveTitle(){syncTitleInputs();S.title=S.title||L('หัวข้อ','Title');closeSheet();renderStep();toast(L('บันทึกแล้ว ✓','Saved ✓'));}
function toggleFree(){syncTitleInputs();S.free=!S.free;openSheet('title');renderStep();}
function setUnit(u){syncTitleInputs();S.unit=u;openSheet('title');renderStep();}
function setFreeWord(w){syncTitleInputs();S.freeWord=w;openSheet('title');renderStep();}
function setMedia(m){S.media=m;if(m==='video')S.images=[];openSheet('image');renderStep();}
function adj(k,d){S[k]=Math.max(1,(S[k]||1)+d);renderStep();}
function onImgFiles(inp){const mx=isFree()?1:pkg().maxImg;[...inp.files].forEach(f=>{if(S.images.length<mx)S.images.push(URL.createObjectURL(f));});inp.value='';openSheet('image');renderStep();}
function onVidFile(inp){const f=inp.files[0];if(f){S.videoUrl=URL.createObjectURL(f);S.videoName=f.name;}inp.value='';openSheet('image');renderStep();}
function rmImg(i){S.images.splice(i,1);openSheet('image');renderStep();}
function setCta(slot,id){S[slot]=id;if(slot==='cta')S.ctaLabel='';else S.cta2Label='';renderStep();openSheet(slot);}
function saveCtaLabel(slot){const v=el('fCtaLabel').value;if(slot==='cta')S.ctaLabel=v;else S.cta2Label=v;closeSheet();renderStep();toast(L('บันทึกปุ่มแล้ว ✓','Button saved ✓'));}
function rmCta2(){S.cta2=null;S.cta2Label='';closeSheet();renderStep();toast(L('เอาปุ่มที่ 2 ออกแล้ว','2nd button removed'));}
/* after-CTA (Section 3) destination content */
function rowsHtml(rows){return (rows||[]).map((r,i)=>`<div class="ex-row"><input class="fld rN" value="${esc(r[0])}" placeholder="${L('ชื่อรายการ','Item name')}" aria-label="${L('ชื่อรายการที่ ','Item name ')+(i+1)}"><input class="fld rP" value="${esc(r[1])}" placeholder="${L('ราคา','Price')}" aria-label="${L('ราคารายการที่ ','Item price ')+(i+1)}" style="max-width:96px"><button class="rrm" onclick="rmRow(${i})" aria-label="${L('ลบรายการที่ ','Remove item ')+(i+1)}">✕</button></div>`).join('');}
function activeRows(){return S.cta==='order'?S.after.order:S.after.menu;}
function afterSync(){const A=S.after;[['aLink','link'],['aArea','area'],['aFloor','floor'],['aBed','bed'],['aBath','bath'],['aPark','park'],['aFurnish','furnish'],['aMenuLink','menuLink'],['aDeliv','deliv'],['aMin','min'],['aOpen','bkOpen'],['aClose','bkClose'],['aSlot','bkSlot'],['aAhead','bkAhead'],['aCap','cap'],['aEvStart','evStart'],['aEvEnd','evEnd'],['aEvWhen','evWhen'],['aEvPlace','evPlace'],['aEvCap','evCap']].forEach(([id,k])=>{if(el(id))A[k]=el(id).value;});
  if(el('rowsBox')){const ns=[...document.querySelectorAll('#rowsBox .rN')].map(x=>x.value),ps=[...document.querySelectorAll('#rowsBox .rP')].map(x=>x.value),arr=ns.map((n,i)=>[n,ps[i]||'']);if(S.cta==='order')A.order=arr;else A.menu=arr;}}
function addRow(){afterSync();activeRows().push(['','']);openSheet('after');}
function rmRow(i){afterSync();activeRows().splice(i,1);openSheet('after');}
function toggleFul(f){afterSync();const a=S.after.ful,i=a.indexOf(f);if(i>=0)a.splice(i,1);else a.push(f);openSheet('after');}
function saveAfter(){afterSync();closeSheet();renderStep();toast(L('บันทึกแล้ว ✓','Saved ✓'));}
function afterText(){const A=S.after;switch(S.cta){
  case 'viewListing':return [A.area&&A.area+L(' ตร.ม.',' sqm'),A.bed&&A.bed+L(' นอน',' bd'),A.bath&&A.bath+L(' น้ำ',' ba'),A.furnish&&L(A.furnish,FURN_EN[A.furnish]||A.furnish)].filter(Boolean).join(' · ')||'—';
  case 'viewMenu':return (A.menu.filter(r=>r[0]).length)+L(' รายการ',' items');
  case 'order':return (A.order.filter(r=>r[0]).length)+L(' รายการ',' items')+' · '+A.ful.length+L(' ช่องทาง',' channels');
  case 'book':return L('จอง ','Book ')+A.bkOpen+'–'+A.bkClose+' · /'+A.bkSlot+L(' นาที',' min');
  case 'signup':case 'event':return [A.evStart,A.evPlace].filter(Boolean).join(' · ')||(A.link?L('มีฟอร์ม','has form'):'—');
  default:return A.link?L('ลิงก์ปลายทาง','custom link'):L('อัตโนมัติ','automatic');
}}
function upgrade(){const i=PKGS.findIndex(p=>p.id===S.pkg);if(i<PKGS.length-1)S.pkg=PKGS[i+1].id;openSheet('image');renderStep();}

el('nextBtn').onclick=()=>{
  if(el('nextBtn').disabled)return;
  if(S.step<S.total){S.step++;renderStep();}
  else{el('canvas').innerHTML=`<div class="canvas-body"><div class="fin"><div class="done-check">✓</div><div style="font-family:'Mitr';font-weight:600;font-size:20px;color:var(--navy)">${L('ส่งโฆษณาแล้ว!','Ad submitted!')}</div><p style="font-size:13px;color:var(--muted);margin-top:8px;max-width:240px">(prototype) ${isFree()?L('Catalog Ad ฟรี — ส่งเข้าระบบรอตรวจอนุมัติ','Free Catalog Ad — submitted for review'):L('ส่งเข้าระบบรอตรวจอนุมัติ · ยอด ฿','Submitted for review · total ฿')+total().toLocaleString()+' ('+S.kiosks+L(' จอ × ',' screens × ')+S.weeks+L(' สัปดาห์',' weeks')+')'+L(' — ชำระเงินหลังได้รับการยืนยัน',' — payment after approval')}</p></div></div>`;
    el('rail').innerHTML='';el('actbar').hidden=true;}
};
el('backBtn').onclick=()=>{if(S.step>1){S.step--;renderStep();}};
el('scrim').onclick=closeSheet;
renderStep();
</script>
</body>
</html>
