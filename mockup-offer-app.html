<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AquaMX · ลงโฆษณา (App Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Mitr:wght@500;600&family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
/* tokens copied verbatim from /offer */
:root{
  --navy:#0E3361; --navy-deep:#072147;
  --orange:#C9864C; --orange-strong:#A36738; --orange-soft:#F6E5D0;
  --cream:#F4F6FA; --ink:#0B1B33; --muted:#5C6B82; --white:#fff;
  --line:#E6E9F1; --ink-40:#8B98AE; --green:#2E9E5B;
}
html,body{height:100%;}
body{background:#dfe3ea;color:var(--ink);font-family:'IBM Plex Sans Thai','Nunito',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:inherit;cursor:pointer;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.app{height:100dvh;max-width:480px;margin:0 auto;background:var(--cream);display:flex;flex-direction:column;position:relative;box-shadow:0 0 50px -10px rgba(0,0,0,.2);}
.appbar{flex:0 0 auto;padding:13px 18px 9px;background:var(--white);border-bottom:1px solid var(--line);}
.appbar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.brand{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:20px;color:var(--navy);letter-spacing:-.02em;}
.brand .x{color:var(--orange);}
.exit{font-size:12px;color:var(--muted);background:none;border:none;}
.rail{display:flex;align-items:center;gap:5px;}
.rail .seg{flex:1;height:4px;border-radius:3px;background:var(--line);}
.rail .seg.done{background:var(--orange);}
.rail .lbl{font-size:11px;color:var(--muted);margin-left:4px;font-weight:700;}

.canvas{flex:1 1 auto;min-height:0;position:relative;display:flex;flex-direction:column;align-items:center;padding:14px 14px 14px;overflow:hidden;}
.canvas-head{flex:0 0 auto;width:100%;text-align:left;margin-bottom:14px;}
.canvas-head h1{font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:800;font-size:19px;color:var(--navy);line-height:1.12;}
.canvas-head p{font-size:13px;color:var(--muted);margin-top:3px;}
.canvas-body{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}

/* overlay side nav */
.nav{position:absolute;bottom:16px;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:25;background:none;border:none;}
.nav.l{left:14px;} .nav.r{right:14px;}
.nav .ar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 12px -3px rgba(0,0,0,.35);}
.nav.r .ar{background:var(--navy);color:#fff;}
.nav.l .ar{background:#fff;color:var(--muted);border:1.5px solid var(--line);}
.nav .cap{font-size:10px;font-weight:700;color:var(--navy);background:rgba(255,255,255,.92);padding:1px 7px;border-radius:7px;white-space:nowrap;}
.nav:disabled{opacity:.35;} .nav[hidden]{display:none;}

/* format pick */
.fmt-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px;align-self:center;}
.fmt-card{background:var(--white);border:2px solid var(--line);border-radius:16px;padding:10px 9px 12px;text-align:center;}
.fmt-card.on{border-color:var(--orange);background:#fffdf8;box-shadow:0 3px 12px -5px rgba(201,134,76,0.5);}
.fmt-card .mini{display:flex;justify-content:center;margin-bottom:9px;}
/* the preview content is absolute-positioned with fixed-px text, so it cannot
   reflow at a narrower width — scale the WHOLE totem instead (stays pixel-correct). */
.tmini{width:148px;height:283px;overflow:hidden;flex:0 0 auto;}
.tmini .totem{width:200px;transform:scale(0.74);transform-origin:top left;}
.tsum{width:64px;height:122px;overflow:hidden;flex:0 0 auto;}
.tsum .totem{width:200px;transform:scale(0.32);transform-origin:top left;}
.fmt-card .nm{font-weight:700;font-size:14px;color:var(--ink);}
.fmt-card .ds{font-size:11px;color:var(--muted);margin-top:1px;line-height:1.3;}
.fmt-card .free{display:inline-block;margin-top:5px;background:#e9f7ef;color:var(--green);font-size:10px;font-weight:700;padding:2px 9px;border-radius:7px;}
.af-note{font-size:12.5px;color:var(--ink-40);line-height:1.55;margin-top:16px;max-width:380px;width:100%;align-self:center;text-align:left;}   /* real /offer format description, switches per selection */

.pkg{display:flex;align-items:center;gap:12px;background:var(--white);border:2px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;}
.pkg.on{border-color:var(--orange);background:#fffdf8;box-shadow:0 3px 12px -5px rgba(201,134,76,0.5);}
.pkg .tier{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:15px;color:var(--navy);min-width:62px;}
.pkg .feat{flex:1;font-size:12px;color:var(--muted);line-height:1.35;}
.pkg .pr{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:15px;color:var(--orange-strong);white-space:nowrap;text-align:right;}
.pkg .pr small{display:block;font-size:10px;color:var(--muted);font-weight:600;}
.pkg.pop{position:relative;} .pkg.pop::after{content:'นิยม';position:absolute;top:-8px;right:12px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;}
.free-card{background:var(--white);border:2px solid #9fd9b4;border-radius:16px;padding:22px 18px;text-align:center;max-width:320px;}
.free-card .big{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:30px;color:var(--green);}
.free-card p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5;}
.free-card .until{margin-top:12px;background:#e9f7ef;color:var(--green);font-weight:700;font-size:13px;padding:8px 14px;border-radius:10px;display:inline-block;}

.cats{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;flex:0 0 auto;width:100%;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap;}
.cat.on{border-color:var(--orange);background:var(--orange);color:#fff;}

/* ===== LIVE PREVIEW (.tt-* / .pm-*) — copied verbatim from /offer ===== */
.totem-wrap{display:flex;justify-content:center;}
.totem{width:200px;text-align:left;}   /* isolate preview from any container's text-align (e.g. centered cards) */
.tt-screen{width:100%;aspect-ratio:9/16;border:3px solid #0c111c;border-bottom:none;border-radius:9px 9px 0 0;position:relative;overflow:hidden;background:#0a0c10;display:grid;grid-template-rows:auto 1fr auto;}
.tt-stage{position:relative;overflow:hidden;}
.tt-topbar{background:#0e1d3a;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 9px;height:23px;border-bottom:1px solid rgba(255,255,255,0.06);z-index:10;}
.tt-time{font-size:8px;font-weight:600;color:#fff;justify-self:start;letter-spacing:0.05em;font-variant-numeric:tabular-nums;}
.tt-tdot{width:3px;height:3px;border-radius:50%;background:#6DD5E8;box-shadow:0 0 4px #6DD5E8;justify-self:center;animation:tt-dotpulse 2s ease-in-out infinite;}
.tt-weather{justify-self:end;display:flex;align-items:center;gap:3px;font-size:7px;color:rgba(255,255,255,0.6);font-weight:500;}
.tt-weather .ic{font-size:9px;} .tt-weather b{color:#fff;font-weight:600;}
.tt-bottombar{background:#0e1d3a;height:16px;border-top:1px solid rgba(255,255,255,0.06);overflow:hidden;display:flex;align-items:center;}
.tt-marq{display:flex;white-space:nowrap;animation:tt-marquee 20s linear infinite;}
.tt-marq span{font-size:6.5px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:0.22em;text-transform:uppercase;padding:0 13px;}
.tt-marq b{color:#6DD5E8;font-size:5px;align-self:center;}
@keyframes tt-marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes tt-dotpulse{0%,100%{opacity:1}50%{opacity:.3}}
.tt-base{width:100%;height:26px;background:linear-gradient(180deg,#1b2740 0%,#05080d 100%);border-top:2px solid #36486a;border-radius:0 0 9px 9px;box-shadow:inset 0 2px 5px -1px rgba(0,0,0,0.5), 0 14px 24px -8px rgba(0,0,0,0.5);}
.tt-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#11151c;}
.tt-bg.empty::after{content:'แตะเพื่อใส่รูป';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3a4456;font-size:9px;}
.tt-grad{position:absolute;inset:auto 0 0 0;height:72%;background:linear-gradient(0deg,rgba(5,6,8,0.92) 0%,rgba(5,6,8,0.35) 50%,transparent 100%);}
.tt-menu{position:absolute;top:12px;left:12px;z-index:6;display:flex;align-items:center;gap:6px;background:rgba(8,12,22,0.55);border:1px solid rgba(255,255,255,0.42);color:#fff;font-size:8.5px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;padding:7px 11px;border-radius:9px;box-shadow:0 0 0 2px rgba(109,213,232,0.4), 0 6px 14px rgba(0,0,0,0.45);backdrop-filter:blur(8px);}
.tt-content{position:absolute;left:12px;right:12px;bottom:12px;z-index:5;display:flex;flex-direction:column;align-items:stretch;gap:7px;}
.tt-content .tt-eyebrow{align-self:flex-start;}
.tt-content .hot:first-of-type{margin-top:0;}
.tt-content .tt-cta-wrap{margin-top:4px;}
.tt-eyebrow{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid rgba(255,255,255,0.4);border-radius:20px;background:rgba(8,12,22,0.35);font-size:7px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;}
.tt-eyebrow::before{content:'';width:4px;height:4px;border-radius:50%;background:#6DD5E8;box-shadow:0 0 5px #6DD5E8;animation:tt-eb-pulse 2.2s ease-in-out infinite;}
.tt-title{font-family:'Mitr',sans-serif;font-weight:600;font-size:20px;line-height:1.12;text-transform:uppercase;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.5);}
.tt-price{display:flex;align-items:baseline;gap:5px;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:23px;color:#FBD7A8;line-height:1;text-shadow:0 1px 7px rgba(0,0,0,0.6);}
.tt-sub{font-size:9px;line-height:1.4;color:rgba(255,255,255,0.88);text-shadow:0 1px 4px rgba(0,0,0,0.55);}
.tt-dock{position:absolute;left:12px;right:12px;bottom:12px;z-index:6;display:grid;grid-template-columns:1fr;gap:5px;}
.tt-cta{width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(8,12,22,0.5);border:1px solid rgba(255,255,255,0.4);color:#fff;font-family:'IBM Plex Sans Thai','Nunito',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 11px;border-radius:8px;backdrop-filter:blur(4px);}
.tt-cta.sec{font-weight:600;border-color:rgba(255,255,255,0.26);}
.tt-cta.add{border-style:dashed;border-color:rgba(109,213,232,0.7);color:#6DD5E8;justify-content:center;}
@keyframes tt-eb-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.55}}
.tt-imgdots{position:absolute;top:9px;right:11px;z-index:6;display:flex;gap:3px;}
.tt-imgdots i{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45);} .tt-imgdots i.on{background:#fff;}
/* menu-ad (catalog) preview — copied from /offer .pm-* */
.pm-screen{width:100%;aspect-ratio:9/16;border:3px solid #0c111c;border-bottom:none;border-radius:9px 9px 0 0;overflow:hidden;background:linear-gradient(165deg,#050608,#0e1d3a);display:flex;flex-direction:column;}
.pm-head{flex-shrink:0;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;padding:11px 11px 9px;border-bottom:1px solid rgba(255,255,255,.08);}
.pm-back{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;}
.pm-title{font-family:'Anton',sans-serif;font-weight:400;font-size:15px;color:#fff;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-lang{padding:3px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:7.5px;font-weight:700;border-radius:5px;letter-spacing:1px;}
.pm-body{flex:1;overflow-y:auto;padding:10px 11px 14px;scrollbar-width:none;}
.pm-body::-webkit-scrollbar{width:0;}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pm-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;}
.pm-card-img{width:100%;height:60px;background-size:cover;background-position:center;background-color:#11151c;}
.pm-card-info{padding:7px 8px 9px;}
.pm-card-name{font-size:9.5px;font-weight:700;color:#fff;line-height:1.25;}
.pm-card-meta{margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#FBD7A8;letter-spacing:.3px;font-weight:700;}

/* hotspots */
.hot{cursor:pointer;outline:2px dashed transparent;outline-offset:2px;transition:outline-color .15s,background .15s;border-radius:7px;position:relative;}
.hot:hover,.hot:focus-visible{outline-color:#6DD5E8;background:rgba(109,213,232,.12);}
.hot .chip{position:absolute;top:-9px;right:-6px;background:#6DD5E8;color:#06222b;font-size:8.5px;font-weight:800;border-radius:6px;padding:1px 5px;opacity:0;transition:opacity .15s;}
.hot:hover .chip,.hot:focus-visible .chip{opacity:1;}
.tap-hint{flex:0 0 auto;margin-top:8px;font-size:12px;color:var(--orange-strong);font-weight:600;}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(8,12,22,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;}
.scrim.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--white);border-radius:20px 20px 0 0;padding:8px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);z-index:41;max-height:82dvh;overflow-y:auto;}
.sheet.open{transform:translateY(0);}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
.sheet h3{font-family:'Mitr','IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:17px;color:var(--navy);margin-bottom:3px;}
.sheet .hint{font-size:12.5px;color:var(--muted);margin-bottom:13px;}
.fld{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;}
.fld:focus{outline:none;border-color:var(--orange);}
.sheet-save{width:100%;margin-top:15px;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:15px;}
.sheet-rm{width:100%;margin-top:8px;background:none;color:#b23b2e;border:none;padding:8px;font-weight:600;font-size:13px;}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.img-cell{aspect-ratio:1;border-radius:11px;background-size:cover;background-position:center;position:relative;border:1.5px solid var(--line);}
.img-cell .rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;border:none;font-size:12px;}
.img-add{aspect-ratio:1;border:1.5px dashed var(--orange);border-radius:11px;background:#fffdf8;color:var(--orange-strong);font-size:22px;}
.img-add:disabled{opacity:.4;border-style:solid;color:var(--muted);border-color:var(--line);background:var(--cream);}
.cap-note{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;} .cap-note b{color:var(--orange-strong);}
.upsell{margin-top:10px;background:#fff7ec;border:1.5px solid var(--orange);border-radius:11px;padding:10px 12px;font-size:12.5px;display:flex;align-items:center;gap:8px;justify-content:space-between;color:var(--orange-strong);}
.upsell button{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;}
.cta-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cta-opt{border:1.5px solid var(--line);border-radius:11px;padding:11px;font-size:13px;font-weight:600;color:var(--ink);background:#fff;text-align:left;}
.cta-opt.on{border-color:var(--orange);background:#fffdf8;}
.sum{width:100%;max-width:330px;}
.sum-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
.sum-row .k{color:var(--muted);} .sum-row .v{font-weight:700;color:var(--ink);}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px;}
.sum-total .k{font-weight:700;} .sum-total .v{font-family:'Nunito','IBM Plex Sans Thai',sans-serif;font-weight:800;font-size:24px;color:var(--orange-strong);}
.fin{text-align:center;} .fin .done-check{width:60px;height:60px;border-radius:50%;background:#e9f7ef;color:var(--green);font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.proto-tag{position:fixed;top:6px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;padding:3px 10px;border-radius:8px;z-index:50;opacity:.8;}
</style>
</head>
<body>
<div class="proto-tag">PROTOTYPE · mock data</div>
<div class="app">
  <div class="appbar">
    <div class="appbar-top"><span class="brand">aqua<span class="x">m</span>x</span><button class="exit">✕ ออก</button></div>
    <div class="rail" id="rail"></div>
  </div>
  <div class="canvas" id="canvas"></div>
  <button class="nav l" id="backBtn" hidden><span class="ar">←</span></button>
  <button class="nav r" id="nextBtn"><span class="ar" id="nextAr">→</span><span class="cap" id="nextCap">ถัดไป</span></button>
</div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<script>
const FREE_UNTIL='ส.ค. 2569';
const PKGS=[
  {id:'starter',name:'Starter',price:55,maxImg:1,feat:'รูป 1 ใบ · 8 วิ · 25 ครั้ง/วัน'},
  {id:'booster',name:'Booster',price:90,maxImg:5,feat:'รูป 5 ใบ · 12 วิ · 50 ครั้ง/วัน'},
  {id:'pro',name:'Pro',price:128,maxImg:10,feat:'รูป 10 ใบ · วิดีโอ · 16 วิ · 75 ครั้ง/วัน',pop:true},
  {id:'premium',name:'Premium',price:160,maxImg:15,feat:'รูป 15 ใบ · วิดีโอ · 20 วิ · 100 ครั้ง/วัน'},
];
const CTAS=[{id:'viewOffer',label:'View Offer'},{id:'viewMenu',label:'View Menu'},{id:'book',label:'Book Now'},{id:'signup',label:'Sign Up'},{id:'viewStore',label:'View Store'},{id:'viewListing',label:'View Listing'}];
const CATS=[{id:'Dining',th:'ร้านอาหาร',cta:'viewMenu',cta2:'book'},{id:'Groceries',th:'ของชำ',cta:'viewStore',cta2:null},{id:'Services',th:'บริการ',cta:'viewOffer',cta2:'book'},{id:'Health & Beauty',th:'สุขภาพ&ความงาม',cta:'book',cta2:null},{id:'Property',th:'อสังหาฯ',cta:'viewListing',cta2:'book'}];
const PHOTO='https://picsum.photos/seed/aqsalon/360/640';
const STOCK=['hair','salon','style','barber','beauty','spa'].map(s=>'https://picsum.photos/seed/aq'+s+'/320/560');
const MENU=[['ตัดผม','฿250'],['สระไดร์','฿180'],['ทำสีผม','฿1,200'],['ทรีตเมนต์','฿600']];
const MENUIMG=['scissor','blowdry','haircolor','spa'].map(s=>'https://picsum.photos/seed/aqm'+s+'/200/140');
const DESC={media:'แสดงเป็นสื่อบนจอ signage แบบหมุนวนเป็นรอบ ๆ · ลูกค้าที่สนใจกดปุ่มคำสั่งบนจอเพื่อทำรายการต่อได้',catalog:'แสดงเป็นรายการ (directory) บนจอ จัดตามหมวดที่เลือก · ลูกค้ากดเลือกจากเมนู แล้วกดปุ่มคำสั่งทำรายการได้'};
const MIMG=['#6a8caf','#b06a4f','#5f9e7a','#c2a05a'].map(c=>`data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='80'><rect width='120' height='80' fill='${encodeURIComponent(c)}'/></svg>`);

const S={step:1,total:4,format:null,pkg:'pro',category:'Services',title:'ชื่อโฆษณาของคุณ',sub:'คำบรรยายสั้นๆ',price:'',images:[],cta:'viewOffer',cta2:null};
const pkg=()=>PKGS.find(p=>p.id===S.pkg);
const lbl=id=>(CTAS.find(c=>c.id===id)||{}).label;
const el=id=>document.getElementById(id);
const isFree=()=>S.format==='catalog';
const TOPBAR=`<div class="tt-topbar"><span class="tt-time">11:33</span><span class="tt-tdot"></span><span class="tt-weather"><span class="ic">☀</span><b>28°</b></span></div>`;
const MARQ=`<div class="tt-bottombar"><div class="tt-marq"><span>Touch to explore</span><b>●</b><span>Now serving</span><b>●</b><span>Touch to explore</span><b>●</b><span>Now serving</span><b>●</b></div></div>`;

/* SAMPLE media (fixed example) */
function sampleMedia(){
  return `<div class="totem"><div class="tt-screen">${TOPBAR}
    <div class="tt-stage">
      <div class="tt-bg" style="background-image:url('${PHOTO}')"></div><div class="tt-grad"></div>
      <div class="tt-menu"><span class="tt-burger"></span>MENU</div>
      <div class="tt-content"><span class="tt-eyebrow">บริการ</span><div class="tt-title">DE ICON SALON</div><div class="tt-sub">ตัดและจัดแต่งทรงผม</div>
        <span class="tt-cta tt-cta-wrap"><span>View Offer</span><span>→</span></span></div>
    </div>${MARQ}</div><div class="tt-base"></div></div>`;
}
function sampleCatalog(){
  return `<div class="totem"><div class="pm-screen">
    <div class="pm-head"><span class="pm-back">‹</span><span class="pm-title">DE ICON SALON</span><span class="pm-lang">TH</span></div>
    <div class="pm-body"><div class="pm-grid">${MENU.map((m,i)=>`<div class="pm-card"><div class="pm-card-img" style="background-image:url('${MENUIMG[i%MENUIMG.length]}')"></div><div class="pm-card-info"><div class="pm-card-name">${m[0]}</div><div class="pm-card-meta">${m[1]}</div></div></div>`).join('')}</div></div>
  ${MARQ}</div><div class="tt-base"></div></div>`;
}
/* EDITABLE media (step 3) */
function editMedia(){
  const bg=S.images[0]?`<div class="tt-bg" style="background-image:url('${S.images[0]}')"></div>`:`<div class="tt-bg empty"></div>`;
  const dots=S.images.length>1?`<div class="tt-imgdots">${S.images.map((_,i)=>`<i class="${i?'':'on'}"></i>`).join('')}</div>`:'';
  const price=S.price?`<div class="tt-price">฿${S.price}</div>`:'';
  const cta2=S.cta2?`<div class="hot tt-cta-wrap" data-edit="cta2" tabindex="0" role="button"><span class="tt-cta sec"><span>${lbl(S.cta2)}</span><span>↗</span></span><span class="chip">ปุ่ม2 ✎</span></div>`
    :`<div class="hot tt-cta-wrap" data-edit="cta2add" tabindex="0" role="button"><span class="tt-cta add">+ เพิ่มปุ่มที่ 2</span></div>`;
  return `<div class="totem"><div class="tt-screen">${TOPBAR}
    <div class="tt-stage">${bg}${dots}<div class="tt-grad"></div><div class="tt-menu"><span class="tt-burger"></span>MENU</div>
      <div class="hot" data-edit="image" tabindex="0" role="button" style="position:absolute;inset:23px 0 55% 0;"><span class="chip">รูป ✎</span></div>
      <div class="tt-content"><span class="tt-eyebrow">${S.category}</span>
        <div class="hot" data-edit="title" tabindex="0" role="button"><div class="tt-title">${S.title}</div>${price}<span class="chip">หัวข้อ ✎</span></div>
        <div class="tt-sub">${S.sub||''}</div>
        <div class="hot tt-cta-wrap" data-edit="cta" tabindex="0" role="button"><span class="tt-cta"><span>${lbl(S.cta)}</span><span>→</span></span><span class="chip">ปุ่ม ✎</span></div>
        ${cta2}
      </div></div>${MARQ}</div><div class="tt-base"></div></div>`;
}
function editCatalog(){
  return `<div class="totem"><div class="pm-screen">
    <div class="pm-head"><span class="pm-back">‹</span><div class="hot" data-edit="title" tabindex="0" role="button"><span class="pm-title">${S.title}</span><span class="chip">ชื่อ ✎</span></div><span class="pm-lang">TH</span></div>
    <div class="pm-body"><div class="pm-grid">${MENU.map((m,i)=>`<div class="pm-card"><div class="pm-card-img" style="background-image:url('${MENUIMG[i%MENUIMG.length]}')"></div><div class="pm-card-info"><div class="pm-card-name">${m[0]}</div><div class="pm-card-meta">${m[1]}</div></div></div>`).join('')}</div></div>
  ${MARQ}</div><div class="tt-base"></div></div>`;
}
const editPreview=()=>isFree()?editCatalog():editMedia();

function renderStep(){
  el('rail').innerHTML=Array.from({length:S.total},(_,i)=>`<div class="seg ${i<S.step?'done':''}"></div>`).join('')+`<span class="lbl">${S.step}/${S.total}</span>`;
  el('backBtn').hidden=S.step<=1;
  const c=el('canvas'),nA=el('nextAr'),nC=el('nextCap');
  el('nextBtn').disabled=(S.step===1&&!S.format);
  if(S.step<S.total){nA.textContent='→';nC.textContent='ถัดไป';}else{nA.textContent='✓';nC.textContent=isFree()?'เผยแพร่ฟรี':'จ่าย ฿'+pkg().price;}

  if(S.step===1){
    c.innerHTML=`<div class="canvas-head"><h1>เลือกรูปแบบโฆษณา</h1><p>นี่คือตัวอย่างจริงของแต่ละแบบ</p></div>
      <div class="canvas-body" style="flex-direction:column;justify-content:center;"><div class="fmt-pick">
        <div class="fmt-card ${S.format==='media'?'on':''}" data-fmt="media"><div class="mini"><div class="tmini">${sampleMedia()}</div></div><div class="nm">📺 Media Ad</div></div>
        <div class="fmt-card ${S.format==='catalog'?'on':''}" data-fmt="catalog"><div class="mini"><div class="tmini">${sampleCatalog()}</div></div><div class="nm">📋 Catalog Ad</div><span class="free">ฟรี</span></div>
      </div>
      <div class="af-note">${S.format?DESC[S.format]:'แตะเลือกรูปแบบด้านบนเพื่อดูรายละเอียด'}</div></div>`;
  } else if(S.step===2){
    if(isFree()){
      c.innerHTML=`<div class="canvas-head"><h1>แพ็กเกจ</h1><p>Catalog Ad ช่วงนี้ใช้ฟรี</p></div>
        <div class="canvas-body"><div class="free-card"><div class="big">ฟรี</div><p>Catalog Ad (เมนู/รายการ) เปิดให้ใช้<b>ฟรี</b>ในช่วงโปรเปิดตัว · ลงได้เลย ไม่มีค่าใช้จ่าย</p><div class="until">🎉 ฟรีถึง ${FREE_UNTIL}</div></div></div>`;
    } else {
      c.innerHTML=`<div class="canvas-head"><h1>เลือกแพ็กเกจ</h1><p>แพ็กกำหนดจำนวนรูป + ฟีเจอร์</p></div>
        <div class="canvas-body" style="align-items:flex-start;overflow-y:auto;"><div style="width:100%;max-width:330px;">
        ${PKGS.map(p=>`<div class="pkg ${S.pkg===p.id?'on':''} ${p.pop?'pop':''}" data-pkg="${p.id}"><span class="tier">${p.name}</span><span class="feat">${p.feat}</span><span class="pr">฿${p.price}<small>/สัปดาห์</small></span></div>`).join('')}
        </div></div>`;
    }
  } else if(S.step===3){
    c.innerHTML=`<div class="canvas-head"><h1>รายละเอียด</h1><p>เลือกหมวด แล้วแตะแก้บนจอ</p></div>
      <div class="cats">${CATS.map(ct=>`<button class="cat ${S.category===ct.id?'on':''}" data-cat="${ct.id}">${ct.th}</button>`).join('')}</div>
      <div class="canvas-body">${editPreview()}</div>
      <div class="tap-hint">👆 แตะ รูป · หัวข้อ · ปุ่ม บนจอ</div>`;
    bindHot();
  } else if(S.step===4){
    const p=pkg();
    c.innerHTML=`<div class="canvas-head"><h1>สรุป${isFree()?'':' & ชำระเงิน'}</h1><p>ตรวจก่อนเผยแพร่</p></div>
      <div class="canvas-body" style="align-items:flex-start;"><div class="sum">
        <div style="display:flex;gap:14px;align-items:center;margin-bottom:12px;"><div class="tsum">${editPreview()}</div>
          <div><div style="font-family:'Mitr';font-weight:600;font-size:16px;color:var(--navy)">${S.title}</div><div style="font-size:12px;color:var(--muted)">${S.category} · ${S.format==='media'?'Media Ad':'Catalog Ad'}</div></div></div>
        <div class="sum-row"><span class="k">แพ็กเกจ</span><span class="v">${isFree()?'Catalog (ฟรี)':p.name}</span></div>
        ${isFree()?'':`<div class="sum-row"><span class="k">รูปภาพ</span><span class="v">${S.images.length} / ${p.maxImg} ใบ</span></div>`}
        <div class="sum-row"><span class="k">ปุ่มคำสั่ง</span><span class="v">${lbl(S.cta)}${S.cta2?' + '+lbl(S.cta2):''}</span></div>
        <div class="sum-total"><span class="k">รวม</span><span class="v">฿${isFree()?'0':p.price}<small style="font-size:13px;color:var(--muted);font-weight:600">${isFree()?'':' /สัปดาห์'}</small></span></div>
      </div></div>`;
  }
  bindPicks();
}
function bindPicks(){
  document.querySelectorAll('[data-fmt]').forEach(b=>b.onclick=()=>{S.format=b.dataset.fmt;renderStep();});
  document.querySelectorAll('[data-pkg]').forEach(b=>b.onclick=()=>{S.pkg=b.dataset.pkg;if(S.images.length>pkg().maxImg)S.images=S.images.slice(0,pkg().maxImg);renderStep();});
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{const ct=CATS.find(x=>x.id===b.dataset.cat);S.category=ct.id;S.cta=ct.cta;S.cta2=ct.cta2;renderStep();});
}
function bindHot(){document.querySelectorAll('.hot[data-edit]').forEach(h=>{const o=()=>openSheet(h.dataset.edit);h.onclick=o;h.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();o();}};});}

function openSheet(kind){
  const sh=el('sheet');let html='';
  if(kind==='title'){
    html=`<h3>หัวข้อ & ราคา</h3><p class="hint">ข้อความใหญ่บนจอ</p>
      <input class="fld" id="fTitle" value="${esc(S.title)}" placeholder="ชื่อโฆษณา">
      <input class="fld" id="fSub" value="${esc(S.sub)}" placeholder="คำบรรยายสั้น" style="margin-top:10px;">
      <input class="fld" id="fPrice" value="${esc(S.price)}" placeholder="ราคา (เช่น 59) — ไม่ใส่ก็ได้" inputmode="numeric" style="margin-top:10px;">
      <button class="sheet-save" onclick="saveTitle()">บันทึก</button>`;
  } else if(kind==='image'){
    const p=pkg(),full=S.images.length>=p.maxImg;
    html=`<h3>รูปภาพ</h3><p class="hint">แพ็ก ${p.name} ใส่ได้สูงสุด ${p.maxImg} ใบ</p>
      <div class="img-grid">${S.images.map((u,i)=>`<div class="img-cell" style="background-image:url('${u}')"><button class="rm" onclick="rmImg(${i})">✕</button></div>`).join('')}<button class="img-add" onclick="addImg()" ${full?'disabled':''}>＋</button></div>
      <div class="cap-note">ใส่แล้ว <b>${S.images.length}</b> / ${p.maxImg} ใบ</div>
      ${full&&p.id!=='premium'?`<div class="upsell"><span>อยากใส่รูปเพิ่ม?</span><button onclick="upgrade()">อัปเกรด →</button></div>`:''}`;
  } else if(kind==='cta'||kind==='cta2'||kind==='cta2add'){
    const isP=kind==='cta',cur=isP?S.cta:S.cta2;
    html=`<h3>${isP?'ปุ่มหลัก':'ปุ่มที่ 2'}</h3><p class="hint">ปุ่มที่ลูกค้าแตะบนจอ</p>
      <div class="cta-opts">${CTAS.map(c=>`<button class="cta-opt ${cur===c.id?'on':''}" onclick="setCta('${isP?'cta':'cta2'}','${c.id}')">${c.label}</button>`).join('')}</div>
      ${!isP&&S.cta2?'<button class="sheet-rm" onclick="rmCta2()">เอาปุ่มที่ 2 ออก</button>':''}`;
  }
  sh.innerHTML='<div class="grab"></div>'+html;sh.classList.add('open');el('scrim').classList.add('open');
}
function closeSheet(){el('sheet').classList.remove('open');el('scrim').classList.remove('open');}
function esc(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function saveTitle(){S.title=el('fTitle').value||'หัวข้อ';S.sub=el('fSub').value;S.price=el('fPrice').value.replace(/[^0-9]/g,'');closeSheet();renderStep();}
function addImg(){const p=pkg();if(S.images.length>=p.maxImg)return;S.images.push(STOCK[S.images.length%STOCK.length]);openSheet('image');renderStep();}
function rmImg(i){S.images.splice(i,1);openSheet('image');renderStep();}
function setCta(slot,id){S[slot]=id;closeSheet();renderStep();}
function rmCta2(){S.cta2=null;closeSheet();renderStep();}
function upgrade(){const i=PKGS.findIndex(p=>p.id===S.pkg);if(i<PKGS.length-1)S.pkg=PKGS[i+1].id;openSheet('image');renderStep();}

el('nextBtn').onclick=()=>{
  if(el('nextBtn').disabled)return;
  if(S.step<S.total){S.step++;renderStep();}
  else{el('canvas').innerHTML=`<div class="canvas-body"><div class="fin"><div class="done-check">✓</div><div style="font-family:'Mitr';font-weight:600;font-size:20px;color:var(--navy)">ส่งโฆษณาแล้ว!</div><p style="font-size:13px;color:var(--muted);margin-top:8px;max-width:240px">(prototype) ${isFree()?'Catalog Ad ฟรี — ส่งเข้าระบบรออนุมัติ':'ของจริงจะชำระ ฿'+pkg().price+' แล้วส่งเข้าระบบ'}</p></div></div>`;
    el('rail').innerHTML='';el('nextBtn').hidden=true;el('backBtn').hidden=true;}
};
el('backBtn').onclick=()=>{if(S.step>1){S.step--;renderStep();}};
el('scrim').onclick=closeSheet;
renderStep();
</script>
</body>
</html>
