<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Premium Vertical Digital Signage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== RESET & BASE ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
        }

        /* ==================== LAYOUT ==================== */
        .aspect-ratio-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center; background: #000;
        }
        .signage-container {
            position: relative; width: 100%; height: 100%;
            max-width: 56.25vh; max-height: 177.78vw;
            display: grid; grid-template-rows: 14vh 79vh 7vh;
            overflow: hidden; background: #000;
        }

        /* ==================== TOP BAR ==================== */
        .top-bar {
            background: linear-gradient(135deg, #001D56 0%, #002775 100%);
            display: grid; grid-template-columns: 50fr 50fr;
            align-items: center; padding: 1.2vh 3vh 2.5vh 3vh;
            border-bottom: 0.5vh solid #C4682D;
            height: 14vh; box-sizing: border-box; overflow: hidden;
        }
        .location-info { display: flex; flex-direction: column; justify-content: center; gap: 0.5vh; height: 100%; }
        .city-name { font-size: 3vh; font-weight: 700; color: #fff; letter-spacing: 0.1vh; line-height: 1.2; }
        .time-weather-row { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 1vh; }
        .local-time {
            font-size: 2.2vh; font-weight: 600; color: #C4682D; line-height: 1.2;
            text-align: left; justify-self: start; font-variant-numeric: tabular-nums; min-width: 10vh;
        }
        .local-date { font-size: 1.4vh; color: #ccc; line-height: 1.2; }
        .weather-info {
            position: relative; display: flex; align-items: center; justify-content: flex-end;
            font-size: 1.4vh; color: #fff; line-height: 1.2; justify-self: end; margin-right: 3vh;
        }
        .weather-icon { font-size: 4vh; line-height: 1; position: relative; z-index: 1; margin-right: -1vh; }
        .weather-temp { font-weight: 700; font-size: 2.2vh; color: #C4682D; font-variant-numeric: tabular-nums; position: relative; z-index: 2; }

        /* World Clocks */
        .world-clocks { display: grid; grid-template-columns: repeat(3,1fr); height: 100%; width: 100%; column-gap: 1.5vh; }
        .clock-wrapper { display: grid; grid-template-rows: 3vh 1fr; height: 100%; justify-items: center; align-items: start; width: 100%; min-width: 0; }
        .clock-city {
            font-size: 0.95vh; font-weight: 600; color: #fff; white-space: nowrap;
            align-self: end; justify-self: center; line-height: 1;
            height: 3vh; display: flex; align-items: flex-end; justify-content: center;
            width: 100%; overflow: hidden; text-overflow: ellipsis;
        }
        .analog-clock {
            width: 5.5vh; height: 5.5vh; border: 0.3vh solid #C4682D;
            border-radius: 50%; position: relative; align-self: center; justify-self: center;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }
        .analog-clock.dark-theme { background: rgba(0,29,86,0.8); box-shadow: 0 0 1vh rgba(196,104,45,0.3); }
        .analog-clock.dark-theme .hour-hand { background: #fff; }
        .analog-clock.dark-theme .minute-hand { background: #ccc; }
        .analog-clock.dark-theme .second-hand { background: #C4682D; }
        .analog-clock.light-theme { background: rgba(255,255,255,0.95); box-shadow: 0 0 1.5vh rgba(196,104,45,0.5); }
        .analog-clock.light-theme .hour-hand { background: #001D56; }
        .analog-clock.light-theme .minute-hand { background: #003D86; }
        .analog-clock.light-theme .second-hand { background: #C4682D; }
        .analog-clock.light-theme .clock-center { background: #C4682D; }
        .clock-center {
            width: 0.6vh; height: 0.6vh; background: #C4682D; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 10;
        }
        .clock-hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 0.25vh 0.25vh 0 0; }
        .hour-hand { width: 0.3vh; height: 1.8vh; background: #fff; margin-left: -0.15vh; }
        .minute-hand { width: 0.25vh; height: 2.5vh; background: #ccc; margin-left: -0.125vh; }
        .second-hand { width: 0.2vh; height: 2.7vh; background: #C4682D; margin-left: -0.1vh; }

        /* ==================== VIDEO ZONE ==================== */
        .video-zone {
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; height: 79vh; box-sizing: border-box;
        }
        .video-player { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .video-hidden { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; }

        /* ==================== NOTICE CARD (text-only notice playlist slot) ==================== */
        .notice-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(160deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #fff; text-align: center; padding: 4vh 3vh; box-sizing: border-box;
        }
        .notice-card-icon { font-size: 5vh; margin-bottom: 2vh; }
        .notice-card-title { font-size: 3vh; font-weight: 700; line-height: 1.35; }

        /* ==================== MENU BUTTON (top-left overlay) ==================== */
        .menu-btn {
    position: absolute; top: 2.5vh; left: 2.5vh; z-index: 200;
    background: rgba(0,10,30,0.30); color: #fff;
    border: none;
    border-radius: 1.2vh; padding: 1.2vh 2vh;
    font-size: 2vh; font-family: 'Montserrat', sans-serif; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 1vh;
    touch-action: manipulation; user-select: none;
    box-shadow: 0 1vh 4vh rgba(0,0,0,0.40);
    transition: background 0.15s;
}
.menu-btn:active { background: rgba(196,104,45,0.30); }
        .hamburger { display: flex; flex-direction: column; gap: 0.45vh; }
        .hamburger span { display: block; width: 2.3vh; height: 0.28vh; background: #fff; border-radius: 0.2vh; }

        /* ==================== CATEGORY PANEL ==================== */
        .category-panel {
    position: absolute; top: 7.8vh; left: 2.5vh; z-index: 199;
    background: rgba(0,10,30,0.30);
    border: none;
    border-radius: 1.2vh; padding: 0.8vh 0;
    min-width: 26vh; display: none; flex-direction: column;
    box-shadow: 0 1vh 4vh rgba(0,0,0,0.40);
}
        .category-panel.open { display: flex; }
        .category-panel-item {
            padding: 1.5vh 2.5vh; font-size: 1.9vh; font-weight: 600; color: #fff;
            cursor: pointer; display: flex; align-items: center; gap: 1.4vh;
            touch-action: manipulation; user-select: none; transition: background 0.12s;
        }
        .category-panel-item:active { background: rgba(196,104,45,0.28); }
        .cat-icon { font-size: 2.2vh; }

        /* ==================== TOUCH TO EXPLORE (bottom-center overlay) ==================== */
        .touch-to-explore {
            position: absolute; left: 50%; bottom: 4vh; transform: translateX(-50%);
            background: rgba(196,104,45,0.30); color: #fff;
            padding: 1.8vh 4.5vh; border-radius: 5vh;
            font-size: 2.1vh; font-weight: 700; white-space: nowrap;
            cursor: pointer; z-index: 100; touch-action: manipulation; user-select: none;
            box-shadow: 0 1vh 3vh rgba(0,0,0,0.5);
            transition: background 0.15s, transform 0.15s;
        }
        .touch-to-explore:active { background: rgba(196,104,45,0.30); transform: translateX(-50%) scale(0.97); }

        /* ==================== CATEGORY SCREEN (full overlay) ==================== */
        /* Video is paused when category screen opens to reduce visual distraction behind the overlay */
        .category-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 150;
            background: linear-gradient(160deg, #001030 0%, #001D56 100%);
            display: none; flex-direction: column; overflow: hidden;
        }
        .category-screen.open { display: flex; }
        .category-screen-header {
            display: flex; align-items: center;
            padding: 2.5vh 2.5vh 1.5vh; flex-shrink: 0;
            border-bottom: 0.2vh solid rgba(196,104,45,0.35); gap: 1.5vh;
        }
        .back-btn {
            background: rgba(196,104,45,0.18); border: 0.2vh solid rgba(196,104,45,0.45);
            color: #C4682D; border-radius: 50%; width: 5vh; height: 5vh;
            font-size: 2.4vh; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; transition: background 0.12s;
        }
        .back-btn:active { background: rgba(196,104,45,0.45); }
        .category-screen-title { font-size: 2.8vh; font-weight: 700; color: #fff; letter-spacing: 0.18vh; }
        /* Provider grid — vertical scroll container, holds subcategory sections */
        .provider-grid {
            flex: 1; overflow-y: auto; padding: 0.5vh 0 2vh;
            display: flex; flex-direction: column;
        }
        .provider-grid::-webkit-scrollbar { width: 0; }

        /* Subcategory section */
        .subcat-section { display: flex; flex-direction: column; }
        .subcat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.4vh 2vh 0.7vh;
            border-bottom: 0.1vh solid rgba(255,255,255,0.08);
        }
        .subcat-header-label {
            font-size: 1.55vh; font-weight: 700;
            color: rgba(255,255,255,0.88); letter-spacing: 0.04vh;
        }
        .subcat-header-chevron { font-size: 1.8vh; color: rgba(196,104,45,0.7); }

        /* Horizontal card row inside each subcategory section */
        .subcat-cards {
            display: flex; flex-direction: row; gap: 1.4vh;
            overflow-x: auto; padding: 1.2vh 2vh 1.6vh;
        }
        .subcat-cards::-webkit-scrollbar { height: 0; }

        /* Provider card — fixed-width for horizontal scroll */
        .provider-card {
            background: rgba(255,255,255,0.07); border: 0.15vh solid rgba(255,255,255,0.12);
            border-radius: 2vh; padding: 1.8vh 1.2vh 1.5vh; cursor: pointer; flex-shrink: 0;
            width: 13.5vh; display: flex; flex-direction: column; align-items: center; gap: 0.8vh;
            touch-action: manipulation; transition: background 0.12s, border-color 0.12s;
        }
        .provider-card:active { background: rgba(196,104,45,0.2); border-color: rgba(196,104,45,0.6); }
        .provider-card-icon { font-size: 4.2vh; line-height: 1; }
        .provider-card-name { font-size: 1.35vh; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; }
        .provider-card-sub  { font-size: 1.1vh; color: rgba(255,255,255,0.5); text-align: center; }

        /* Update card — image version for building updates */
        .update-card {
            background: rgba(255,255,255,0.07); border: 0.15vh solid rgba(255,255,255,0.12);
            border-radius: 2vh; overflow: hidden; cursor: pointer; flex-shrink: 0;
            width: 21vh; display: flex; flex-direction: column;
            touch-action: manipulation; transition: background 0.12s, border-color 0.12s;
        }
        .update-card:active { background: rgba(196,104,45,0.2); border-color: rgba(196,104,45,0.6); }
        .update-card-img { width: 100%; height: 12vh; object-fit: cover; display: block; background: #0a1830; }
        .update-card-img-ph {
            width: 100%; height: 12vh; background: linear-gradient(135deg, #0a1830, #0f2545);
            display: flex; align-items: center; justify-content: center; font-size: 3.5vh;
        }
        .update-card-title {
            font-size: 1.35vh; font-weight: 700; color: #fff; line-height: 1.35;
            padding: 1vh 1.2vh 1.4vh; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* ==================== POPUP BACKDROP ==================== */
        .popup-backdrop {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 260;
            background: rgba(0,0,0,0.72);
            display: none; align-items: center; justify-content: center; padding: 3vh;
        }
        .popup-backdrop.open { display: flex; }

        /* ==================== POPUP BOX (shared base) ==================== */
        .popup-box {
            background: linear-gradient(160deg, #001540 0%, #001D56 100%);
            border: 0.2vh solid rgba(196,104,45,0.45); border-radius: 3vh;
            width: 100%; max-height: 90%; overflow-y: auto;
            position: relative; padding: 3.5vh 2.5vh 3vh;
            display: flex; flex-direction: column; gap: 1.4vh;
        }
        .popup-box::-webkit-scrollbar { width: 0; }
        .popup-close {
            position: absolute; top: 1.5vh; right: 1.5vh;
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            font-size: 2vh; width: 4.5vh; height: 4.5vh; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; z-index: 10; transition: background 0.12s;
        }
        .popup-close:active { background: rgba(196,104,45,0.55); }

        /* ==================== ITEM POPUP ==================== */
        /* Square popup — 1:1 aspect ratio; gallery fills remaining flex space */
        #itemPopupBox {
            aspect-ratio: 1 / 1;
            max-height: none;
            overflow: hidden;
            padding: 2.5vh 2.5vh 2vh;
        }
        .item-popup-gallery {
            width: 100%; flex: 1; height: auto; border-radius: 1.5vh;
            overflow: hidden; position: relative;
            margin-top: 0; background: #0a1830;
        }
        .item-popup-gallery-track {
            display: flex; height: 100%;
            overflow-x: scroll; -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: none; scroll-snap-type: x mandatory;
        }
        .item-popup-gallery-track::-webkit-scrollbar { display: none; }
        .item-popup-gallery-track img {
            flex-shrink: 0; width: 100%; height: 100%;
            object-fit: cover; scroll-snap-align: start; display: block;
        }
        .item-popup-gallery-ph {
            flex-shrink: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a1830, #0f2545); font-size: 7vh;
        }
        .item-popup-gallery-dots {
            position: absolute; bottom: 1vh; left: 50%; transform: translateX(-50%);
            display: flex; gap: 0.6vh; align-items: center;
        }
        .item-popup-gallery-dot {
            width: 0.8vh; height: 0.8vh; border-radius: 50%;
            background: rgba(255,255,255,0.35);
        }
        .item-popup-gallery-dot.active { background: #fff; }
        /* Overlays inside gallery */
        .item-popup-gallery-top-grad {
            position: absolute; top: 0; left: 0; right: 0; height: 55%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.68) 0%, transparent 100%);
            pointer-events: none;
        }
        .item-popup-gallery-grad {
            position: absolute; bottom: 0; left: 0; right: 0; height: 75%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            pointer-events: none;
        }
        /* Short description — top of gallery */
        .item-popup-description {
            position: absolute; top: 1.4vh; left: 1.8vh; right: 1.8vh;
            font-size: 5.48vh; font-weight: 700;
            color: rgba(255,255,255,0.95); line-height: 1.45;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        /* Provider name — bottom of gallery (provider popup only); pushed above CTA */
        .item-popup-gallery-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 1.2vh 1.8vh 8vh;
        }
        .item-popup-name-en { font-size: 2.4vh; font-weight: 700; color: #fff; line-height: 1.2; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        .item-popup-name-th { font-size: 1.7vh; color: rgba(255,255,255,0.75); line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
        /* CTA button — bottom of gallery */
        #itemCtaBtn {
            position: absolute; bottom: 1.5vh; left: 1.8vh; right: 1.8vh; width: auto;
            padding: 1.4vh 2vh; font-size: 1.85vh;
        }
.item-popup-meta { display: flex; gap: 1.2vh; flex-wrap: wrap; }
        .meta-tag {
            background: rgba(255,255,255,0.08); border-radius: 3vh;
            padding: 0.5vh 1.4vh; font-size: 1.35vh; color: rgba(255,255,255,0.68);
            display: flex; align-items: center; gap: 0.4vh;
        }
        .item-popup-description { font-size: 1.65vh; color: rgba(255,255,255,0.72); line-height: 1.65; }
        .item-popup-contacts { display: flex; gap: 1.1vh; flex-wrap: wrap; }
        .contact-chip {
            background: rgba(196,104,45,0.18); border: 0.15vh solid rgba(196,104,45,0.38);
            border-radius: 2vh; padding: 0.7vh 1.4vh;
            font-size: 1.4vh; color: #C4682D; font-weight: 600;
            display: flex; align-items: center; gap: 0.4vh;
        }
        .popup-cta-btn {
            background: linear-gradient(135deg, #C4682D 0%, #E07935 100%);
            color: #fff; border: none; border-radius: 2.5vh; padding: 2vh;
            font-size: 2.1vh; font-weight: 700; font-family: 'Montserrat', sans-serif;
            cursor: pointer; touch-action: manipulation; width: 100%;
            text-align: center; transition: opacity 0.15s;
        }
        .popup-cta-btn:active { opacity: 0.82; }
        .popup-cta-btn.secondary {
            background: transparent; border: 0.2vh solid rgba(196,104,45,0.5); color: #C4682D;
        }

        /* ==================== UPDATE POPUP (Building Updates) ==================== */
        .update-popup-label { font-size: 1.4vh; font-weight: 700; color: #C4682D; letter-spacing: 0.2vh; text-transform: uppercase; }
        .update-popup-image {
            width: 100%; min-height: 24vh; max-height: 50vh; border-radius: 2vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center; font-size: 6vh; flex-shrink: 0;
            background: #101808;
        }
        .update-popup-image img { width: 100%; height: auto; max-height: 50vh; object-fit: contain; display: block; }
        .update-popup-title { font-size: 2.5vh; font-weight: 700; color: #fff; }
        .update-popup-subtitle { font-size: 1.75vh; color: #C4682D; font-weight: 600; }
        .update-popup-body { font-size: 1.65vh; color: rgba(255,255,255,0.72); line-height: 1.65; }

        /* ==================== HANDOFF POPUP ==================== */
        .handoff-heading { font-size: 2vh; font-weight: 700; color: #fff; text-align: center; margin-top: 0.5vh; }
        .handoff-subheading { font-size: 1.45vh; color: rgba(255,255,255,0.55); text-align: center; }
        .qr-wrap {
            background: #fff; border-radius: 1.8vh; padding: 1.5vh;
            display: flex; align-items: center; justify-content: center; align-self: center;
        }
        .qr-wrap img { width: 18vh; height: 18vh; display: block; }
        .qr-url { font-size: 1.15vh; color: rgba(255,255,255,0.38); word-break: break-all; text-align: center; }
        .handoff-unit-ref {
            background: rgba(196,104,45,0.14); border: 0.15vh solid rgba(196,104,45,0.32);
            border-radius: 1.5vh; padding: 1.2vh 2vh;
            font-size: 1.65vh; color: #C4682D; font-weight: 600; text-align: center;
        }
        .or-divider {
            display: flex; align-items: center; gap: 1.5vh;
            color: rgba(255,255,255,0.3); font-size: 1.4vh;
        }
        .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 0.1vh; background: rgba(255,255,255,0.2); }
        .phone-label { font-size: 1.55vh; color: rgba(255,255,255,0.68); }
        .phone-row { display: flex; gap: 1vh; align-items: center; }
        .phone-prefix {
            background: rgba(255,255,255,0.08); border: 0.15vh solid rgba(255,255,255,0.2);
            border-radius: 1.2vh; padding: 1.2vh 1.4vh; font-size: 1.75vh; color: #fff;
            font-family: 'Montserrat', sans-serif; flex-shrink: 0;
        }
        .phone-input {
            flex: 1; background: rgba(255,255,255,0.08); border: 0.15vh solid rgba(255,255,255,0.2);
            border-radius: 1.2vh; padding: 1.2vh 1.4vh; font-size: 1.75vh; color: #fff;
            font-family: 'Montserrat', sans-serif; outline: none;
        }
        .phone-input::placeholder { color: rgba(255,255,255,0.28); }
        .phone-input:focus { border-color: rgba(196,104,45,0.65); }
        .sms-note { font-size: 1.35vh; color: rgba(255,255,255,0.42); text-align: center; }
        .send-confirm-panel {
            background: rgba(255,255,255,0.06); border: 0.15vh solid rgba(255,255,255,0.15);
            border-radius: 1.5vh; padding: 1.8vh 1.5vh 1.4vh;
            flex-direction: column; gap: 1.2vh; align-items: center; text-align: center;
        }
        .send-confirm-msg { font-size: 1.5vh; color: rgba(255,255,255,0.85); line-height: 1.65; }
        .send-confirm-ok-btn {
            background: rgba(196,104,45,0.18); border: 0.15vh solid rgba(196,104,45,0.45);
            color: #C4682D; border-radius: 2vh; padding: 0.9vh 3vh;
            font-size: 1.5vh; font-weight: 700; font-family: 'Montserrat', sans-serif;
            cursor: pointer; touch-action: manipulation;
        }
        .send-confirm-ok-btn:active { background: rgba(196,104,45,0.45); }

        /* ── Phone confirmation dialog ── */
        .phone-confirm-panel {
            background: rgba(255,255,255,0.06); border: 0.15vh solid rgba(255,255,255,0.15);
            border-radius: 1.5vh; padding: 1.8vh 1.5vh 1.4vh;
            flex-direction: column; gap: 1.2vh; align-items: center; text-align: center;
        }
        .phone-confirm-label { font-size: 1.35vh; color: rgba(255,255,255,0.55); }
        .phone-confirm-number { font-size: 2.2vh; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
        .phone-confirm-btns { display: flex; gap: 1.2vh; margin-top: 0.4vh; }
        .phone-confirm-yes {

let categoryConfig = FALLBACK_CATEGORY_CONFIG;

async function loadCategoryConfig() {
    // ── helper: normalise a categoryConfig response to kiosk format ────────────
    // Schema: subcategories is [{id, label{en,th}}], defaultSubcategoryId (string id).
    // Kiosk rendering expects subcategories as [{id, label:{en,th}, order}].
    // label.en is used as the display string for filter tabs.
    function normaliseCategoryConfig(raw) {
        return {
            categories: (raw.categories ?? []).map(cat => ({
                id:      cat.id,
                label:   cat.label,
                ctaItem: cat.ctaItem,
                // support old field names as fallback for baked data built before migration
                fallbackSubcategoryId: cat.defaultSubcategoryId ?? cat.defaultSubcategory ?? cat.fallbackSubcategoryId,
                subcategories: (cat.subcategories ?? []).map((s, i) =>
                    typeof s === 'string'
                        // legacy string format (pre-migration baked data)
                        ? { id: s.toLowerCase().replace(/[^a-z0-9]+/g, '-'), label: { en: s, th: s }, order: i + 1 }
                        // new object format {id, label{en,th}}
                        : { id: s.id, label: s.label, order: i + 1 }
                ),
            })),
        };
    }

    // 0) Use baked data if available (generated by build.mjs)
    if (window.__BAKED__?.categoryConfig?.categories?.length) {
        categoryConfig = normaliseCategoryConfig(window.__BAKED__.categoryConfig);
        _ds.catcfg = 'baked';
        return;
    }
    // 1) Try Sanity — global singleton doc
    try {
        const q = `*[_id == "categoryConfig-global"][0]{
            categories[]{
                id, label, ctaItem, defaultSubcategoryId, subcategories[]{ id, label }
            }
        }`;
        const result = await sanityFetch(q);
        if (result?.categories?.length) {
            categoryConfig = normaliseCategoryConfig(result);
            _ds.catcfg = 'live';
            return;
        }
    } catch(e) { console.warn('Sanity categoryConfig unavailable:', e.message); }

    // 2) Try local category-config.json
    try {
        const r = await fetch('category-config.json');
        if (!r.ok) throw new Error();
        const d = await r.json();
        if (d.categories?.length) { categoryConfig = d; _ds.catcfg = 'json'; return; }
    } catch(e) { /* fall through */ }
    _ds.catcfg = 'fallback';
}

/* Fetch providers from Sanity and merge into MOCK_PROVIDERS by category.
   Mock data remains as fallback for any category that returns nothing. */
async function loadProviders() {
    // ── helper: map new schema shape → shape the kiosk rendering code expects ──
    function normaliseProvider(p) {
        return {
            slug:               p.slug,
            // legacy compat aliases (kiosk rendering still uses these)
            nameEN:             p.name_en ?? p.name_th ?? '',
            nameTH:             p.name_th ?? p.name_en ?? '',
            // new canonical names
            name_th:            p.name_th ?? '',
            name_en:            p.name_en ?? '',
            displayName:        p.displayName ?? 'th',
            icon:               '',                          // emoji icon removed in new schema
            logo:               p.logo ?? '',
            coverImage:         p.coverImage ?? '',
            thumbnail:          p.thumbnail ?? '',
            coverColor:         '#1a1a2e',                   // not in new schema; use neutral default
            location:           p.locationText ?? p.location ?? '',
            hours:              p.openingHours ?? p.hours ?? '',
            phone:              p.phone ?? '',
            line:               p.lineId ?? p.line ?? '',
            website:            p.website ?? '',
            description:        p.description_th ?? p.description_en ?? p.description ?? '',
            description_th:     p.description_th ?? '',
            description_en:     p.description_en ?? '',
            // subCategoryIds: union of all offer subCategories for this provider
            subCategoryIds:     p.offers?.flatMap(o => o.subCategories ?? []) ?? p.subCategoryIds ?? [],
            unitRef:            p.unitRef ?? '',
            defaultHandoffType: p.defaultHandoffType ?? 'qr',
            category:           p.category,
            offers:             p.offers ?? [],
        };
    }

    // 0) Use baked data if available (generated by build.mjs)
    if (window.__BAKED__?.providers && Object.keys(window.__BAKED__.providers).length) {
        // Clear ALL mock categories first — baked data is authoritative.
        // Without this, categories absent from baked data keep showing demo stubs.
        Object.keys(MOCK_PROVIDERS).forEach(cat => { MOCK_PROVIDERS[cat] = []; });
        Object.keys(window.__BAKED__.providers).forEach(cat => {
            MOCK_PROVIDERS[cat] = window.__BAKED__.providers[cat].map(normaliseProvider);
        });
        _ds.providers = 'baked';
        return;
    }
    // 1) Try Sanity — global providers, scoped via their offers
    try {
        const code = window.__BAKED__?.projectCode
                  ?? new URLSearchParams(location.search).get('project')
                  ?? '';
        const q = `*[_type == "provider" && status == true]{
            "slug":          slug.current,
            name_th, name_en, category, displayName,
            locationText, phone, lineId, website, openingHours,
            "logo":          logo.asset->url,
            "coverImage":    coverImage.asset->url,
            "thumbnail":     thumbnail.asset->url,
            description_th, description_en,
            defaultHandoffType, unitRef,
            "offers": *[_type == "offer" && provider._ref == ^._id && status == true &&
                        (scope == "global" || "${code}" in projects[]._ref)]{
                "slug": slug.current, title_th, category, subCategories,
                "primaryImage": primaryImage.asset->url,
                "images": images[].asset->url,
                ctaType, ctaURL
            }
        }`;
        const results = await sanityFetch(q);
        if (!results?.length) { _ds.providers = 'mock'; return; }
        const grouped = {};
        results.forEach(p => {
            if (!grouped[p.category]) grouped[p.category] = [];
            grouped[p.category].push(normaliseProvider(p));
        });
        Object.keys(grouped).forEach(cat => { MOCK_PROVIDERS[cat] = grouped[cat]; });
        _ds.providers = 'live';
    } catch(e) { _ds.providers = 'mock'; }
}

/* Fetch building updates from Sanity; replaces MOCK_UPDATES in-place. */
async function loadBuildingUpdates() {
    // ── helper: map notice media → shape MOCK_UPDATES rendering code expects ───
    // Old buildingUpdate schema had: slug, title, subtitle, icon, bgColor, description, subCategoryIds.
    // New model: media(kind="notice") with content on the linked offer document.
    function normaliseNotice(n) {
        return {
            slug:          n.offer?.slug  ?? n.slug  ?? (n.title ?? '').toLowerCase().replace(/\s+/g, '-'),
            title:         n.offer?.title_th ?? n.title ?? '',
            subtitle:      n.offer?.shortDesc_th ?? n.subtitle ?? '',
            icon:          n.icon  ?? '📢',      // icon no longer in schema; use default
            bgColor:       n.bgColor ?? '#141A08',
            description:   n.offer?.description_th ?? n.description ?? '',
            subCategoryIds: n.offer?.subCategories ?? n.subCategoryIds ?? [],
            url:           n.url ?? '',
            image:         n.posterImage ?? n.offer?.primaryImage ?? null,
        };
    }

    // 0) Use baked data if available (generated by build.mjs)
    // build.mjs now uses key 'notices'; fall back to legacy 'updates' key for old builds.
    const bakedNotices = window.__BAKED__?.notices ?? window.__BAKED__?.updates;
    if (bakedNotices?.length) {
        MOCK_UPDATES.splice(0, MOCK_UPDATES.length, ...bakedNotices.map(normaliseNotice));
        _ds.notices = 'baked';
        return;
    }
    // 1) Try Sanity — media(kind="notice") replaces the retired buildingUpdate type
    try {
        const code = window.__BAKED__?.projectCode
                  ?? new URLSearchParams(location.search).get('project')
                  ?? '';
        const q = `*[_type == "media" && kind == "notice" && isActive == true &&
                    "${code}" in projects[]._ref &&
                    (!defined(expiresAt) || expiresAt > now())
                   ] | order(_createdAt desc){
            title,
            "url": coalesce(videoFile.asset->url, imageFile.asset->url),
            "posterImage": posterImage.asset->url,
            "offer": offer->{ "slug": slug.current, title_th, subCategories, shortDesc_th, description_th }
        }`;
        const results = await sanityFetch(q);
        if (!results?.length) { _ds.notices = 'mock'; return; }
        MOCK_UPDATES.splice(0, MOCK_UPDATES.length, ...results.map(normaliseNotice));
        _ds.notices = 'live';
    } catch(e) { _ds.notices = 'mock'; }
}

/* ========================================================
   APPLICATION STATE
======================================================== */
const S = {
    screen: 'main',        // 'main' | 'category'
    panelOpen: false,
    popup: null,           // null | 'item' | 'update' | 'handoff'
    category: null,
    provider: null,
    offerSlug: null,       // slug of current offer → used to build OLP deep-link in handoff QR
    update: null,
    idleTimer: null,
    countdownInterval: null,
    videoPaused: false     // true when video was paused by category screen
};

/* ========================================================
   IDLE TIMER — applies when screen=category or popup is open
======================================================== */
function resetIdle() {
    // Cancel any running timers and hide the countdown badge immediately
    clearTimeout(S.idleTimer);
    clearInterval(S.countdownInterval);
    S.countdownInterval = null;
    hideIdleCountdown();

    if (S.panelOpen || S.screen === 'category' || S.popup !== null) {
        // Phase 1: wait 30s then start the visible countdown
        S.idleTimer = setTimeout(() => {
            let remaining = 30;
            showIdleCountdown(remaining);
            // Phase 2: tick every 1s for the remaining 30s
            S.countdownInterval = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(S.countdownInterval);
                    S.countdownInterval = null;
                    returnToMain();
                } else {
                    showIdleCountdown(remaining);
                }
            }, 1000);
        }, 30000); // show countdown after 30s of inactivity
    }
}

function showIdleCountdown(seconds) {
    const el = document.getElementById('idleCountdown');
    el.textContent = `Returning to Main in ${seconds}s`;
    el.classList.add('visible');
}

function hideIdleCountdown() {
    const el = document.getElementById('idleCountdown');
    if (el) el.classList.remove('visible');
}

function returnToMain() {
    // Silently close everything and return to attract loop
    // Video continues from current index — NOT restarted
    S.panelOpen = false; S.popup = null; S.screen = 'main';
    S.category = null; S.provider = null; S.offerSlug = null; S.update = null;

    document.getElementById('categoryPanel').classList.remove('open');
    document.getElementById('categoryScreen').classList.remove('open');
    document.getElementById('itemBackdrop').classList.remove('open');
    document.getElementById('updateBackdrop').classList.remove('open');
    document.getElementById('handoffBackdrop').classList.remove('open');
    showMainOverlays(true);

    if (S.videoPaused) {
        document.getElementById('mainVideo').play().catch(() => {});
        S.videoPaused = false;
    }
    clearTimeout(S.idleTimer);
    clearInterval(S.countdownInterval);
    S.countdownInterval = null;
    hideIdleCountdown();
    syncInteractingClass();
}

function syncInteractingClass() {
    // "Interacting" = category screen open OR any popup open.
    // Panel-open alone is still attract mode → no class.
    document.body.classList.toggle('is-interacting',
        S.screen === 'category' || S.popup !== null);
}

// Reset idle on any interaction
document.addEventListener('touchstart', resetIdle, { passive: true });
document.addEventListener('click', resetIdle, { passive: true });

function showMainOverlays(show) {

======================================================== */
function openCategoryScreen(cat) {
    S.panelOpen = false;
    document.getElementById('categoryPanel').classList.remove('open');
    S.screen = 'category';
    S.category = cat;

    const configId = CAT_ID_MAP[cat] || cat;
    const catConfig = categoryConfig.categories.find(c => c.id === configId);
    const isUpdates = (cat === 'building-updates' || cat === 'updates');

    // Title — bilingual
    document.getElementById('categoryScreenTitle').textContent = catConfig
        ? (uiLang === 'th'
            ? (catConfig.label?.th || catConfig.label?.en || cat).toUpperCase()
            : (catConfig.label?.en || cat).toUpperCase())
        : (CAT_LABELS[cat] || cat.toUpperCase());

    // Lang toggle button label: shows the language you CAN switch to
    const langBtn = document.getElementById('langToggleBtn');
    langBtn.textContent = uiLang === 'th' ? 'EN' : 'TH';

    renderCategoryGrid(cat, catConfig, isUpdates);

    document.getElementById('categoryScreen').classList.add('open');
    showMainOverlays(false);

    const vid = document.getElementById('mainVideo');
    if (!vid.paused) { vid.pause(); S.videoPaused = true; }

    resetIdle();
    syncInteractingClass();
}

/* Render the main content area of the category screen.
   Called on initial open and when language is toggled. */
function renderCategoryGrid(cat, catConfig, isUpdates) {
    const grid = document.getElementById('providerGrid');
    grid.innerHTML = '';

    // ── Building Updates: keep original horizontal-card layout ──────────────
    if (isUpdates) {
        grid.classList.remove('offer-mode');
        const allItems = MOCK_UPDATES;
        if (catConfig && catConfig.subcategories.length > 0) {
            const sortedSubs = [...catConfig.subcategories].sort((a, b) => a.order - b.order);
            const fallbackId = catConfig.fallbackSubcategoryId;
            const orphans = allItems.filter(item => {
                const ids = item.subCategoryIds || [];
                return ids.length === 0 || !sortedSubs.some(s => ids.includes(s.id));
            });
            sortedSubs.forEach(subcat => {
                const matched = allItems.filter(item => (item.subCategoryIds || []).includes(subcat.id));
                const extras  = subcat.id === fallbackId ? orphans : [];
                const sectionItems = matched.concat(extras.filter(o => !matched.includes(o)));
                if (sectionItems.length === 0) return;
                const section = document.createElement('div');
                section.className = 'subcat-section';
                const header = document.createElement('div');
                header.className = 'subcat-header';
                header.innerHTML = `<span class="subcat-header-label">${
                    uiLang === 'th' ? (subcat.label.th || subcat.label.en) : subcat.label.en
                }</span><span class="subcat-header-chevron">›</span>`;
                section.appendChild(header);
                const row = document.createElement('div');
                row.className = 'subcat-cards';
                sectionItems.forEach(item => {
                    const card = makeUpdateCard(item);
                    card.addEventListener('click', () => openUpdatePopup(item));
                    row.appendChild(card);
                });
                section.appendChild(row);
                grid.appendChild(section);
            });
        } else {
            const row = document.createElement('div');
            row.className = 'subcat-cards';
            allItems.forEach(item => {
                const card = makeUpdateCard(item);
                card.addEventListener('click', () => openUpdatePopup(item));
                row.appendChild(card);
            });
            grid.appendChild(row);
        }
        return;
    }

    // ── Offer-centric 2-col grid with looped vertical scroll ──────────────────
    grid.classList.add('offer-mode');

    const providers = MOCK_PROVIDERS[cat] || [];

    // Flatten all offers from all providers in this category
    const allOfferItems = [];
    providers.forEach(p => {
        (p.offers || []).forEach(o => {
            allOfferItems.push({ offer: o, provider: p });
        });
    });

    if (allOfferItems.length === 0) {
        grid.classList.remove('offer-mode');
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:5vh 2vh;text-align:center;color:rgba(255,255,255,0.38);font-size:1.8vh;';
        empty.textContent = uiLang === 'th' ? 'ยังไม่มีรายการ' : 'No items available';
        grid.appendChild(empty);
        return;
    }

    // Build section DOM (used twice for seamless loop)
    function buildSectionsFrag() {
        const frag = document.createDocumentFragment();
        if (catConfig && catConfig.subcategories.length > 0) {
            const sortedSubs = [...catConfig.subcategories].sort((a, b) => a.order - b.order);
            const fallbackId = catConfig.fallbackSubcategoryId;
            const orphans = allOfferItems.filter(({ offer }) => {
                const ids = offer.subCategories || [];
                return ids.length === 0 || !sortedSubs.some(s => ids.includes(s.id));
            });
            sortedSubs.forEach(subcat => {
                const matched = allOfferItems.filter(({ offer }) =>
                    (offer.subCategories || []).includes(subcat.id));
                const extras = subcat.id === fallbackId ? orphans : [];
                const sectionItems = [...matched, ...extras.filter(o => !matched.includes(o))];
                if (sectionItems.length === 0) return;
                frag.appendChild(buildOfferSection(
                    uiLang === 'th' ? (subcat.label.th || subcat.label.en) : subcat.label.en,
                    sectionItems, cat
                ));
            });
        } else {
            frag.appendChild(buildOfferSection(null, allOfferItems, cat));
        }
        return frag;
    }

    // Looped scroll container
    const loopEl = document.createElement('div');
    loopEl.className = 'offer-loop-container';
    loopEl.appendChild(buildSectionsFrag());
    grid.appendChild(loopEl);

    // Vertical circular scroll — jump-back technique (A+B+C triple list).
    // Measured after two rAF passes so the element has been laid out.
    requestAnimationFrame(() => requestAnimationFrame(() => {
        const oneH = loopEl.scrollHeight;           // height of one content copy
        if (oneH <= loopEl.clientHeight || oneH === 0) {
            // Content fits vertically — no vertical loop needed.
            // Still initialise horizontal carousels in the single copy.
            loopEl.querySelectorAll('.offer-carousel-track').forEach(initOfferCarousel);
            return;
        }

        // Triple via fresh DOM builds — innerHTML serialisation destroys event listeners.
        // Each buildSectionsFrag() call creates a new DOM tree with fresh listeners.
        loopEl.innerHTML = '';                      // discard the initial (now-measured) copy
        loopEl.appendChild(buildSectionsFrag());    // A
        loopEl.appendChild(buildSectionsFrag());    // B  ← user starts here
        loopEl.appendChild(buildSectionsFrag());    // C
        loopEl.scrollTop = oneH;                    // start viewport at top of B

        // On every scroll tick: if we drift into A or C, silently jump back into B.
        // Because A == B == C, the jump is invisible to the user.
        loopEl.addEventListener('scroll', function () {
            const st = this.scrollTop;
            if (st < oneH)           this.scrollTop = st + oneH;  // drifted into A → jump to B
            else if (st >= oneH * 2) this.scrollTop = st - oneH;  // drifted into C → jump to B
        }, { passive: true });

        // Initialise horizontal carousels in all three vertical copies.
        requestAnimationFrame(function () {
            loopEl.querySelectorAll('.offer-carousel-track').forEach(initOfferCarousel);
        });
    }));
}

/* Reliable tap inside overflow-y:scroll containers on Android WebView.
   touchend fires first; preventDefault() stops the deferred synthetic click
   so fn() only executes once. Falls back to click on desktop (no touch). */
function addTap(el, fn) {
    let moved = false;
    el.addEventListener('touchstart', () => { moved = false; }, { passive: true });
    el.addEventListener('touchmove',  () => { moved = true;  }, { passive: true });
    el.addEventListener('touchend', function(e) {
        if (!moved) { e.preventDefault(); fn(); }
    }); // intentionally not passive — preventDefault cancels the synthetic click
    el.addEventListener('click', fn); // desktop / mouse fallback (touch won't re-fire)
}

function buildOfferSection(label, offerItems, cat) {
    const section = document.createElement('div');
    section.className = 'offer-subcat-section';
    if (label) {
        const lbl = document.createElement('div');
        lbl.className = 'offer-subcat-label';

/* ========================================================
   OFFER CAROUSEL — per-subcategory horizontal infinite loop
   ≤ 2 cards : centred static row (fits without scrolling).
   ≥ 3 cards : A+B+C triple list with jump-back loop,
               identical technique to the vertical offer-loop-container.
   Cards are 21 vh wide → ~2.5 visible in a 56.25 vh screen,
   giving a clear partial-card "peek" that signals scrollability.
======================================================== */
function initOfferCarousel(track) {
    const items = [...track.children];
    const n = items.length;

    // Few cards: fit without scrolling → centre, disable scroll
    if (n <= 2) {
        track.classList.add('carousel-static');
        return;
    }

    // Build [A][B][C] in the track.
    // B = original nodes (retain addTap listeners); A and C are visual clones only.
    function cloneAll() { return items.map(function (it) { return it.cloneNode(true); }); }
    track.innerHTML = '';
    cloneAll().forEach(function (it) { track.appendChild(it); });   // A
    items.forEach(function (it)      { track.appendChild(it); });   // B  (originals with listeners)
    cloneAll().forEach(function (it) { track.appendChild(it); });   // C

    requestAnimationFrame(function () {
        // oneW = scroll distance equal to one full copy.
        // Measured as the offsetLeft difference between first card of B and first card of A.
        // This naturally includes the inter-item gap at the A→B boundary.
        const allCards = track.children;
        const oneW = allCards[n].offsetLeft - allCards[0].offsetLeft;
        if (oneW <= 0) return;  // layout not ready — safety guard

        track.scrollLeft = oneW;  // start viewport at beginning of B

        // On every scroll tick: if we drift into A or C, silently jump back into B.
        track.addEventListener('scroll', function () {
            const sl = track.scrollLeft;
            if (sl < oneW)           track.scrollLeft = sl + oneW;  // drifted into A → B
            else if (sl >= oneW * 2) track.scrollLeft = sl - oneW;  // drifted into C → B
        }, { passive: true });
    });
}

function makeOfferCard(offer, provider) {
    const card = document.createElement('div');
    card.className = 'offer-card';

    const imgSrc = offer.primaryImage || provider.coverImage || provider.thumbnail || '';
    const imgWrap = document.createElement('div');
    imgWrap.className = 'offer-card-img-wrap';
    if (imgSrc) {
        const img = document.createElement('img');
        img.className = 'offer-card-img';
        img.src = imgSrc; img.alt = ''; img.loading = 'lazy';
        imgWrap.appendChild(img);
    } else {
        const ph = document.createElement('div');
        ph.className = 'offer-card-img-ph';
        ph.textContent = '🏪';
        imgWrap.appendChild(ph);
    }

    // Provider name + logo as separate overlays
    const provName = uiLang === 'th'
        ? (provider.name_th || provider.name_en || '')
        : (provider.name_en || provider.name_th || '');

    // Logo — top-left
    if (provider.logo) {
        const logo = document.createElement('img');
        logo.className = 'offer-card-logo-overlay';
        logo.src = provider.logo; logo.alt = ''; logo.loading = 'lazy';
        imgWrap.appendChild(logo);
    }

    // Name — bottom-right
    if (provName) {
        const nameEl = document.createElement('div');
        nameEl.className = 'offer-card-provider-name';
        nameEl.textContent = provName;
        imgWrap.appendChild(nameEl);
    }
    card.appendChild(imgWrap);

    const body = document.createElement('div');
    body.className = 'offer-card-body';

    const title = document.createElement('div');
    title.className = 'offer-card-title';
    title.textContent = uiLang === 'th'
        ? (offer.title_th || offer.title_en || '')
        : (offer.title_en || offer.title_th || '');
    body.appendChild(title);

    card.appendChild(body);
    return card;
}

function openOfferPopup(offer, provider, cat) {
    // offerSlug drives OLP deep-link in the handoff QR; PLP is fallback if null
    S.provider = provider; S.category = cat; S.offerSlug = offer.slug || null; S.popup = 'item';
    S.offerTitleTH = offer.title_th || offer.title_en || null;
    S.offerTitleEN = offer.title_en || offer.title_th || null;
    S.offerTitle = uiLang === 'th' ? S.offerTitleTH : S.offerTitleEN;

    const imgList = [];
    if (offer.primaryImage) imgList.push(offer.primaryImage);
    (offer.images || []).forEach(function (img) {
        if (img && img !== offer.primaryImage) imgList.push(img);

    if (!imgList.length && provider.coverImage) imgList.push(provider.coverImage);
    if (!imgList.length && provider.logo)       imgList.push(provider.logo);

        meta.push(hasCurrency ? p : `${p} Baht`);

        ? (offer.shortDesc_th || offer.shortDesc_en || '')
        : (offer.shortDesc_en || offer.shortDesc_th || '');

}

document.getElementById('touchToExplore').addEventListener('click', function() {
    const cur = playlist[currentVideoIndex];
    if (!cur) return;

    // 1. Provider slug → open that provider's popup directly.
    //    Search the slot's category first, then all categories as a fallback.
    if (cur.providerSlug) {
        const cat = cur.category || '';
        const provider = (MOCK_PROVIDERS[cat] || []).find(p => p.slug === cur.providerSlug)
                      || Object.values(MOCK_PROVIDERS).flat().find(p => p.slug === cur.providerSlug);
        if (provider) {
            // If the slot carries an offerSlug the handoff QR links to OLP (/m/o/);
            // otherwise it falls back to PLP (/m/p/) via the provider slug.
            S.offerSlug = cur.offerSlug || null;
            openItemPopup(provider, cat || 'services');
            return;
        }
    }

    // 2. Category set → open that category screen.
    //    Sanity uses camelCase (buildingUpdates); panel uses kebab (building-updates).
    if (cur.category) {
        const screenCat = cur.category === 'buildingUpdates' ? 'building-updates' : cur.category;
        openCategoryScreen(screenCat);
        return;
    }

    // 3. Notice with no category → building updates screen.
    if (cur.kind === 'notice') {
        openCategoryScreen('building-updates');
        return;
    }

    // 4. Final fallback.
    openCategoryScreen('food');
});

/* ========================================================
   ITEM GALLERY — shared helper for both offer and provider popups
   Replaces the track element each call to clear stale scroll listeners.
   imgList  : string[] of image URLs (may be empty)
   phIcon   : emoji/text shown when imgList is empty
======================================================== */
function populateItemGallery(imgList, phIcon) {
    const gallery  = document.getElementById('itemGallery');
    const oldTrack = document.getElementById('itemGalleryTrack');
    const track    = document.createElement('div');
    track.className = 'item-popup-gallery-track';
    track.id        = 'itemGalleryTrack';
    gallery.replaceChild(track, oldTrack);

    const dots = document.getElementById('itemGalleryDots');
    dots.innerHTML = '';
    dots.style.display = 'none';

    if (!imgList.length) {
        const ph = document.createElement('div');
        ph.className   = 'item-popup-gallery-ph';
        ph.textContent = phIcon || '🏪';
        track.appendChild(ph);
        return;
    }

    imgList.forEach(function (src, i) {
        const img = document.createElement('img');
        img.src     = src;
        img.alt     = '';
        img.loading = i === 0 ? 'eager' : 'lazy';
        track.appendChild(img);
    });

    if (imgList.length > 1) {
        dots.style.display = 'flex';
        imgList.forEach(function (_, i) {
            const dot = document.createElement('div');
            dot.className = 'item-popup-gallery-dot' + (i === 0 ? ' active' : '');
            dots.appendChild(dot);
        });
        track.addEventListener('scroll', function () {
            const idx = Math.round(this.scrollLeft / this.offsetWidth);
            [...dots.children].forEach(function (d, i) {
                d.classList.toggle('active', i === idx);
            });

        }, { passive: true });
    }
}

const CITY_GROUPS = [
    [{ name:'Singapore', tz:'Asia/Singapore' }, { name:'Hong Kong', tz:'Asia/Hong_Kong' }, { name:'Tokyo', tz:'Asia/Tokyo' }],
    [{ name:'New York',  tz:'America/New_York' }, { name:'LA', tz:'America/Los_Angeles' }, { name:'London', tz:'Europe/London' }],
    [{ name:'London',    tz:'Europe/London' }, { name:'Paris', tz:'Europe/Paris' }, { name:'Milan', tz:'Europe/Rome' }]
];
let currentGroupIndex = 0;

function updateBangkokTime() {
    const now = new Date();
    document.getElementById('localTime').textContent =
        now.toLocaleTimeString('en-GB', { timeZone:'Asia/Bangkok', hour12:false });
    document.getElementById('localDate').textContent =
        now.toLocaleDateString('en-GB', { timeZone:'Asia/Bangkok', weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function updateAnalogClock(idx, tz) {
    const now = new Date();
    const ts = now.toLocaleTimeString('en-US', { timeZone:tz, hour12:false });
    const [h, m, s] = ts.split(':').map(Number);
    document.getElementById(`hour${idx}`).style.transform   = `rotate(${(h%12)*30 + m*0.5}deg)`;
    document.getElementById(`minute${idx}`).style.transform = `rotate(${m*6 + s*0.1}deg)`;
    document.getElementById(`second${idx}`).style.transform = `rotate(${s*6}deg)`;
    const clk = document.getElementById(`clock${idx}`);
    const cty = document.getElementById(`city${idx}`);
    if (h >= 6 && h < 18) {
        clk.classList.remove('dark-theme'); clk.classList.add('light-theme'); cty.style.color = '#fff';
    } else {
        clk.classList.remove('light-theme'); clk.classList.add('dark-theme'); cty.style.color = '#C4682D';
    }
}

function updateWorldClocks() {
    CITY_GROUPS[currentGroupIndex].forEach((c, i) => {
        document.getElementById(`city${i+1}`).textContent = c.name;
        updateAnalogClock(i+1, c.tz);
    });
}

function rotateClockGroup() {
    currentGroupIndex = (currentGroupIndex + 1) % CITY_GROUPS.length;
    updateWorldClocks();
}

/* ========================================================
   WEATHER — OpenWeatherMap
======================================================== */
async function fetchWeather() {
    const KEY = 'weather_data', TKEY = 'weather_ts', now = Date.now();
    const cd = localStorage.getItem(KEY), ct = localStorage.getItem(TKEY);
    if (cd && ct && (now - +ct) < CONFIG.CACHE_DURATION) {
        try { updateWeatherUI(JSON.parse(cd)); return; } catch(e) {}
    }
    try {
        const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${CONFIG.BANGKOK_LAT}&lon=${CONFIG.BANGKOK_LON}&appid=${CONFIG.WEATHER_API_KEY}&units=metric`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        if (d.main?.temp && d.weather?.[0]) {
            localStorage.setItem(KEY, JSON.stringify(d)); localStorage.setItem(TKEY, ''+now);
            updateWeatherUI(d);
        }
    } catch(e) {
        try { updateWeatherUI(JSON.parse(cd)); } catch(e2) { mockWeather(); }
    }
}

function weatherIcon(desc) {
    const d = desc.toLowerCase();
    const h = parseInt(new Date().toLocaleTimeString('en-US',{timeZone:'Asia/Bangkok',hour12:false,hour:'numeric'}));
    const night = h >= 18 || h < 6;
    if (d.includes('clear')) return night ? '🌙' : '☀️';
    if (d.includes('few')) return night ? '☁️' : '🌤️';
    if (d.includes('scattered')||d.includes('partly')) return night ? '☁️' : '⛅';
    if (d.includes('cloud')||d.includes('overcast')) return '☁️';
    if (d.includes('light rain')) return '🌦️';
    if (d.includes('rain')||d.includes('drizzle')) return '🌧️';
    if (d.includes('storm')) return '⛈️';
    if (d.includes('snow')) return '🌨️';
    if (d.includes('mist')||d.includes('fog')||d.includes('haze')) return '🌫️';
    return night ? '🌙' : '⛅';
}
function updateWeatherUI(d) {
    try {
        document.getElementById('weatherIcon').textContent = weatherIcon(d.weather[0].description);
        document.getElementById('weatherTemp').textContent = `${Math.round(d.main.temp)}°C`;
    } catch(e) { mockWeather(); }
}
function mockWeather() {
    const h = parseInt(new Date().toLocaleTimeString('en-US',{timeZone:'Asia/Bangkok',hour12:false,hour:'numeric'}));
    document.getElementById('weatherIcon').textContent = (h>=18||h<6) ? '🌙' : '⛅';
    document.getElementById('weatherTemp').textContent = '32°C';
}

/* ========================================================
   NEWS — NewsData.io
======================================================== */
async function fetchNews() {
    const KEY = 'news_data', TKEY = 'news_ts', now = Date.now();
    const cd = localStorage.getItem(KEY), ct = localStorage.getItem(TKEY);
    if (cd && ct && (now - +ct) < CONFIG.CACHE_DURATION) {
        try { updateNewsUI(JSON.parse(cd)); return; } catch(e) {}
    }
    try {
        const r = await fetch(`https://newsdata.io/api/1/news?apikey=${CONFIG.NEWS_API_KEY}&country=th&language=th,en`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        if (d.results?.length) {
            localStorage.setItem(KEY, JSON.stringify(d)); localStorage.setItem(TKEY, ''+now);
            updateNewsUI(d);
        }
    } catch(e) {
        try { updateNewsUI(JSON.parse(cd)); } catch(e2) { mockNews(); }
    }
}
function setTickerSpeed(ticker) {
    // Set animation duration so ticker scrolls at a fixed 120px/s regardless of content length.
    // Content is doubled (html+html), animation goes 0→-50%, so visible distance = half total width.
    const speed = 58; // px per second
    const halfWidth = ticker.scrollWidth / 2;
    const duration = Math.max(10, Math.round(halfWidth / speed));
    ticker.style.animationDuration = duration + 's';
    // Restart animation cleanly
    ticker.style.animation = 'none';
    ticker.offsetHeight; // force reflow
    ticker.style.animation = '';
    ticker.style.animationDuration = duration + 's';
}
function updateNewsUI(d) {
    try {
        const html = d.results.map(a => {
            if (!a?.title) return '';
            return `<span class="news-item">${a.title.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span><span class="news-separator">•</span>`;
        }).filter(Boolean).join('');
        const ticker = document.getElementById('newsTicker');
        ticker.innerHTML = html + html;
        setTickerSpeed(ticker);
    } catch(e) { mockNews(); }
}
function mockNews() {
    const items = [
        'Thailand economic growth expected to accelerate in 2026',
        'ประเทศไทยเตรียมพร้อมต้อนรับนักท่องเที่ยวในช่วงเทศกาล',
        'Digital transformation continues to reshape Thai businesses',
        'กรุงเทพฯ ติดอันดับเมืองที่น่าเที่ยวชมที่สุดในโลก',
        'Thailand leads ASEAN in sustainable tourism initiatives'
    ];
    const html = items.map(t => `<span class="news-item">${t}</span><span class="news-separator">•</span>`).join('');
    const ticker = document.getElementById('newsTicker');
    ticker.innerHTML = html + html;
    setTickerSpeed(ticker);
}

/* ========================================================
   VIDEO PLAYLIST — preload & seamless loop
======================================================== */
let playlist = [
    { url:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4', cta_en:'Explore Our Menu', cta_th:'สำรวจเมนูของเรา' },
    { url:'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4', cta_en:'Discover Properties', cta_th:'ค้นพบอสังหาริมทรัพย์' }
];
let currentVideoIndex = 0;

async function loadPlaylist() {
    // 0) Use baked data if available (generated by build.mjs)
    if (window.__BAKED__?.playlist?.length) {
        // Normalise new field names → shape kiosk rendering expects:
        //   displayDuration  → imageDurationOverride (alias; kiosk uses the legacy name)
        //   category         already coalesced in baked data: coalesce(touchExploreCategory, offer.category)
        playlist = window.__BAKED__.playlist.map(item => ({
            ...item,
            imageDurationOverride: item.displayDuration ?? item.imageDurationOverride,
        }));
        _ds.playlist = 'baked';
        return;
    }
    // 1) Try Sanity (live fallback — updated for new schema)
    try {
        const code = window.__BAKED__?.projectCode
                  ?? new URLSearchParams(location.search).get('project')
                  ?? '';
        const q = `*[
            _type == "playlistItem" &&
            project->code.current == "${code}" &&
            enabled == true &&
            (!defined(startAt) || startAt <= now()) &&
            (!defined(endAt)   || endAt   >  now()) &&
            media->isActive == true &&
            media->kind in ["promo", "notice"] &&
            (media->scope == "global" || "${code}" in (media->projects[]->code.current))
        ] | order(order asc){
            "kind":               media->kind,
            "title":              media->title,
            "mediaType":          select(
                                    defined(media->type)              => media->type,
                                    defined(media->videoFile.asset)   => "video",
                                    defined(media->imageFile.asset)   => "image",
                                    defined(media->posterImage.asset) => "image"
                                  ),
            "url":                coalesce(media->videoFile.asset->url, media->imageFile.asset->url, media->posterImage.asset->url),
            "category":           coalesce(touchExploreCategory, media->offer->category),
            "defaultDuration":    media->defaultImageDuration,
            "imageDurationOverride": displayDuration,
            "displayDuration":    displayDuration,
            "offerSlug":          media->offer->slug.current,
            "providerSlug":       coalesce(
                                    touchExploreDefaultProvider->slug.current,
                                    media->offer->provider->slug.current
                                  ),
            touchExploreCategory,
            notes
        }`;
        const results = await sanityFetch(q);
        if (results?.length) {
            playlist = results;
            _ds.playlist = 'live';
            return;
        }
    } catch(e) { /* fall through */ }

    // 2) Try local playlist.json
    try {
        const r = await fetch('playlist.json');
        const d = await r.json();
        if (d?.length) { playlist = d; _ds.playlist = 'json'; return; }
    } catch(e) { /* fall through */ }
    _ds.playlist = 'empty';
}

function playVideo() {
    const videoA = document.getElementById('mainVideo');
    const videoB = document.getElementById('preloadVideo');
    const img    = document.getElementById('imageSlide');
    const notice = document.getElementById('noticeCard');
    let imageTimer = null;

    // active = currently visible video element
    // buffer = hidden element preloading the next video
    let active = videoA;
    let buffer = videoB;

    function advance() {
        currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
        doPlay(currentVideoIndex);
    }

    // Hide only non-video layers (image + notice card)
    function hideOverlays() {
        img.classList.add('video-hidden'); img.removeAttribute('src');
        notice.classList.add('video-hidden');
    }

    // Preload the next video into buffer (called after each video starts)
    function preloadNext(idx) {
        const nxt = (idx + 1) % playlist.length;
        if (playlist[nxt]?.mediaType === 'video' && playlist[nxt].url) {
            buffer.src = playlist[nxt].url;
            buffer.load();
        }
    }

    function doPlay(idx) {
        const cur = playlist[idx];
        clearTimeout(imageTimer);

        if (cur.kind === 'notice' && !cur.url) {
            // ── Text-only notice card ─────────────────────────────────────────
            active.pause(); active.classList.add('video-hidden');
            hideOverlays();
            document.getElementById('noticeCardTitle').textContent = cur.title ?? '';
            notice.classList.remove('video-hidden');
            const secs = cur.imageDurationOverride ?? cur.defaultDuration ?? 10;
            imageTimer = setTimeout(() => { notice.classList.add('video-hidden'); advance(); }, secs * 1000);

        } else if (cur.mediaType === 'image') {
            // ── Image slot: single image or multi-image slideshow ─────────────
            active.pause(); active.classList.add('video-hidden');
            hideOverlays();
            const secs = cur.imageDurationOverride ?? cur.defaultDuration ?? 10;
            const urls = (cur.images?.length > 0) ? cur.images : (cur.url ? [cur.url] : []);
            if (urls.length === 0) { advance(); return; }
            let imgIdx = 0;
            function showNextImage() {
                if (imgIdx >= urls.length) { advance(); return; }
                img.src = urls[imgIdx++];
                img.classList.remove('video-hidden');
                imageTimer = setTimeout(showNextImage, secs * 1000);
            }
            showNextImage();

        } else {
            // ── Video slot — seamless A/B swap ────────────────────────────────
            // Check if buffer already has this video preloaded and ready to play.
            // readyState >= 3 (HAVE_FUTURE_DATA) means enough data to start playing.
            const bufferSrc  = buffer.getAttribute('src') ?? '';
            const bufferReady = bufferSrc === cur.url && buffer.readyState >= 3;

            hideOverlays();

            function swapToBuffer() {
                // Hide current active (keeps last frame — no black flash)
                active.pause();
                active.classList.add('video-hidden');
                // Swap references
                const tmp = active; active = buffer; buffer = tmp;
                // Show and play the new active
                active.classList.remove('video-hidden');
                active.play().catch(() => advance());
                // Preload next into (now free) buffer
                preloadNext(idx);
            }

            if (bufferReady) {
                // Buffer is ready — instant swap, no loading gap
                swapToBuffer();
            } else {
                // Buffer not ready — load into buffer while keeping old active visible
                // (user sees old video's last frame instead of black screen)
                buffer.src = cur.url;
                buffer.load();

                let safeAdvanced = false;
                function safeAdvance() { if (!safeAdvanced) { safeAdvanced = true; advance(); } }
                const safety = setTimeout(safeAdvance, 15000);

                buffer.addEventListener('canplay', () => {
                    clearTimeout(safety);
                    swapToBuffer();
                }, { once: true });

                buffer.addEventListener('error', () => {
                    clearTimeout(safety);
                    safeAdvance();
                }, { once: true });
            }
        }
    }

    // Both elements can be active — attach ended listener to both
    videoA.addEventListener('ended', advance);
    videoB.addEventListener('ended', advance);

    doPlay(currentVideoIndex);
}

/* ========================================================
   INIT
======================================================== */
// ── Service Worker registration ──────────────────────────────────────────────
// Skip SW on localhost — CDN assets load directly; SW's cors-mode fetch causes
// double-errors (503 + CORS block) when the CDN returns errors without CORS headers.
if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('[SW] Registered, scope:', reg.scope);
    }).catch(err => {
        console.warn('[SW] Registration failed:', err);
    });
}

async function init() {
    // ── Clear stale localStorage keys from previous sessions ────────────────
    ['weather_data','weather_data_time','news_data','news_ts'].forEach(k => localStorage.removeItem(k));

    // ── Init lang toggle button label ────────────────────────────────────────
    document.getElementById('langToggleBtn').textContent = uiLang === 'th' ? 'EN' : 'TH';

    // ── Load all data sources in parallel ───────────────────────────────────
    await Promise.all([loadPlaylist(), loadCategoryConfig(), loadProviders(), loadBuildingUpdates()]);

    // ── Pre-warm SW cache with all playlist video/image URLs ─────────────────
    // Runs after playlist loads so SW downloads everything before the second loop.
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        const mediaUrls = playlist
            .map(item => item.url)
            .filter(url => url && /\.(mp4|webm|mov|jpg|jpeg|png|webp)(\?.*)?$/i.test(url));
        if (mediaUrls.length) {
            navigator.serviceWorker.controller.postMessage({ action: 'prewarm', urls: mediaUrls });
            console.log('[SW] Prewarm sent for', mediaUrls.length, 'media URLs');
        }
    }

    // ── Start playlist playback (isolated — a crash here must not kill clocks) ─
    try { playVideo(); } catch(e) { /* playlist empty or corrupt; clocks/news still start */ }

    // ── Start clocks, weather, news — always, regardless of playlist state ──
    mockWeather(); mockNews();
    fetchWeather(); fetchNews();
    updateBangkokTime();    setInterval(updateBangkokTime, 1000);
    updateWorldClocks();    setInterval(updateWorldClocks, 1000);
    setInterval(rotateClockGroup, CONFIG.CITY_ROTATION_INTERVAL);
    setInterval(fetchWeather, CONFIG.CACHE_DURATION);
    setInterval(fetchNews,    CONFIG.CACHE_DURATION);

    // ── Hourly hard-reload (Yodeck Android cache buster) ─────────────────────
    // Yodeck's Android WebView may cache pages aggressively.
    // location.reload() triggers a conditional GET (Cache-Control: max-age=0)
    // so Netlify's no-cache response forces a fully fresh HTML download.
    // Fires once per hour; safe in Yodeck because it reloads the same URL
    // rather than navigating away (navigation can be blocked by the player).
    (function scheduleHourlyReload() {
        var msToNextHour = 3600000 - (Date.now() % 3600000);
        setTimeout(function() { location.reload(); }, msToNextHour);
    })();

    // ── Build stamp: shows build time + data sources ─────────────────────────
    // Visible in bottom-right corner. Helps confirm which build Yodeck is serving.
    // Example: "noble-geo · 2026-03-03 08:12 · pl:baked pv:baked"
    const stamp = document.getElementById('buildStamp');
    if (stamp) {
        const proj = window.__BAKED__?.projectCode ?? '?';
        const rev = window.__BAKED__?.rev ?? 'no-baked-data';
        const sources = [
            `pl:${_ds.playlist  ?? '?'}`,
            `pv:${_ds.providers ?? '?'}`,
        ].join(' ');
        stamp.textContent = `${proj} · rev ${rev} · ${sources}`;
    }

    // ── Missing-baked-data warning (always visible, no ?debug needed) ────────
    // If window.__BAKED__ is absent the page loaded the raw template instead of
    // a built deploy. Providers will be empty. Show a red banner immediately.
    if (!window.__BAKED__) {
        var warn = document.createElement('div');
        warn.style.cssText =
            'position:fixed;bottom:8vh;left:0;right:0;background:#c0392b;color:#fff;' +
            'font-family:monospace;font-size:1.6vh;text-align:center;padding:1vh;z-index:99998;';
        warn.textContent = 'NO BAKED DATA — template served without build.mjs. Providers empty.';
        document.body.appendChild(warn);
    }

    // ── Debug overlay: shown only when URL contains ?debug=1 ─────────────────
    // Displays each data-source value on screen so you can read them in Yodeck.
    if (new URLSearchParams(location.search).get('debug') === '1') {
        const overlay = document.createElement('div');
        overlay.style.cssText =
            'position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;' +
            'font-family:monospace;font-size:1.4vh;padding:1.5vh;z-index:99999;white-space:pre;line-height:1.6;';
        overlay.textContent =
            `=== DEBUG (remove ?debug=1 for production) ===\n` +
            `project:   ${window.__BAKED__?.projectCode ?? 'MISSING - wrong HTML served'}\n` +
            `rev:       ${window.__BAKED__?.rev ?? 'MISSING'}\n` +
            `playlist:  ${_ds.playlist}  (${playlist.length} items)\n` +
            `providers: ${_ds.providers} (cats: ${Object.keys(MOCK_PROVIDERS).filter(c => MOCK_PROVIDERS[c].length).join(', ') || 'none'})\n` +
            `notices:   ${_ds.notices}\n` +
            `catcfg:    ${_ds.catcfg}\n` +
            `UA: ${navigator.userAgent.slice(0,80)}`;
        document.body.appendChild(overlay);
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
