# Rebuild signage sites
#
# Migrated from akeboyz/signage-builder. Pushes to aquamx-biz/* condo repos
# (the ones Netlify actually deploys from). Now includes noble-be19.
#
# Resilient: skips condos whose folder build.mjs didn't create, so a missing
# project in Sanity doesn't fail the whole job. Logs what got pushed at the end.
#
# Triggers:
#   - push to master           (manual code change)
#   - workflow_dispatch        (manual trigger from GitHub UI)
#   - repository_dispatch      (called by aquamx-handoff /api/sanity-webhook
#                               when Sanity content is updated)
#
# Secrets required (Settings > Secrets and variables > Actions):
#   - SANITY_TOKEN   read token for the awjj9g8u/production dataset
#   - GH_PAT         fine-grained PAT, contents:read+write on aquamx-biz/*

name: Rebuild signage sites

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vertical-signage
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build.mjs
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        # build.mjs writes per-project output to ../{code}/ (sibling directories
        # of this checkout). Print what got produced so we know what to push.
        run: |
          node build.mjs
          echo ""
          echo "=== Sibling directories produced ==="
          ls -1 .. | grep -v vertical-signage || true

      - name: Push all built condos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        # Map Sanity project code (left) → aquamx-biz GitHub repo name (right).
        # If a project is missing in Sanity, build.mjs simply doesn't create its
        # folder — we skip the push for that one and keep going.
        run: |
          set +e  # don't abort on individual push failures; we want to try all
          declare -A REPOS=(
            ["noble-geo"]="noble-geo"
            ["lumpini-24"]="lumpini-24"
            ["mahogany-tower"]="mahogany-tower"
            ["the-room-skv21"]="the-room-skv21"
            ["the-room-sukhumvit-21"]="the-room-skv21"
            ["noble-be19"]="noble-be19"
          )

          PUSHED=()
          SKIPPED=()
          FAILED=()

          # For each project: clone its repo, overlay the freshly built files, and
          # push ONLY if something actually changed. build.mjs now bakes a content
          # hash (not a run-time timestamp), so an unchanged project produces byte-
          # identical files → no diff → no push → that project's Netlify site is NOT
          # rebuilt. This stops a single Sanity edit from redeploying every project.
          for CODE in "${!REPOS[@]}"; do
            REPO="${REPOS[$CODE]}"
            DIR="$GITHUB_WORKSPACE/../$CODE"
            URL="https://x-access-token:${GH_PAT}@github.com/aquamx-biz/${REPO}.git"

            if [ ! -d "$DIR" ]; then
              SKIPPED+=("$CODE (folder not built)")
              continue
            fi

            echo ""
            echo "── $CODE → aquamx-biz/$REPO ──"

            RESULT="fail"
            # Retry handles non-fast-forward races between concurrent dispatches.
            for attempt in 1 2 3; do
              WORK="$(mktemp -d)"
              if ! git clone --depth 1 "$URL" "$WORK" 2>/dev/null; then
                # Repo unreachable as a clone (brand new / empty) — start fresh.
                rm -rf "$WORK"; WORK="$(mktemp -d)"
                git init -q "$WORK"
                ( cd "$WORK" && git checkout -q -b master && git remote add origin "$URL" )
              fi

              # Overlay the freshly built files onto the clone.
              for f in index.html sw.js _headers netlify.toml; do
                [ -f "$DIR/$f" ] && cp -f "$DIR/$f" "$WORK/$f"
              done

              cd "$WORK"
              git config user.email "actions@github.com"
              git config user.name  "GitHub Actions"

              # No diff → content identical → skip (do NOT trigger Netlify).
              if [ -z "$(git status --porcelain)" ]; then
                RESULT="nochange"
                cd "$GITHUB_WORKSPACE"; rm -rf "$WORK"
                break
              fi

              git add -A
              git commit -q -m "Auto-rebuild from Sanity update"
              if git push origin HEAD:master 2>/dev/null; then
                RESULT="pushed"
                cd "$GITHUB_WORKSPACE"; rm -rf "$WORK"
                break
              fi

              echo "(push attempt $attempt failed — re-syncing & retrying in 5s…)"
              cd "$GITHUB_WORKSPACE"; rm -rf "$WORK"
              sleep 5
            done

            case "$RESULT" in
              pushed)   PUSHED+=("$CODE → aquamx-biz/$REPO") ;;
              nochange) SKIPPED+=("$CODE (no content change — Netlify NOT triggered)") ;;
              *)        FAILED+=("$CODE → aquamx-biz/$REPO") ;;
            esac
          done

          echo ""
          echo "════════ Rebuild summary ════════"
          echo "Pushed  (${#PUSHED[@]}):"
          for x in "${PUSHED[@]}"; do echo "  ✓ $x"; done
          echo "Skipped (${#SKIPPED[@]}):"
          for x in "${SKIPPED[@]}"; do echo "  - $x"; done
          echo "Failed  (${#FAILED[@]}):"
          for x in "${FAILED[@]}"; do echo "  ✗ $x"; done

          # Fail the job only if a real push failed (skip / nochange are OK).
          [ ${#FAILED[@]} -eq 0 ]
